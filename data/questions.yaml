questions:

  # ===================== УРОВЕНЬ 0: ОСНОВЫ =====================

  # --- Программирование ---
  - topic: programming
    uid: numpy_vectorization
    difficulty: 2
    question: "Почему в numpy/pandas векторизованные операции быстрее питоновского цикла?"
    answer: |
      numpy хранит данные в непрерывном блоке памяти одного типа (C-массив), а
      операции выполняются скомпилированным C-кодом сразу над всем массивом
      (SIMD, без накладных расходов интерпретатора Python на каждой итерации).

      Питоновский цикл же на каждом элементе создаёт Python-объекты, проверяет
      типы, вызывает интерпретатор — это в 10–100 раз медленнее.

      Вывод: избегай `for` по строкам DataFrame; используй векторные операции,
      `.apply` только когда иначе никак, а `iterrows()` — почти никогда.
  - topic: programming
    uid: numpy_broadcasting
    difficulty: 2
    question: "Что такое broadcasting в numpy?"
    answer: |
      Broadcasting — правила, по которым numpy автоматически «растягивает»
      массивы разной формы, чтобы выполнить поэлементную операцию без явного
      копирования.

      Правило: формы сравниваются справа налево; размерности совместимы, если
      они равны или одна из них равна 1.

      Пример: матрица X формы (100, 3) минус вектор средних mean формы (3,) →
      mean «растягивается» до (100, 3), и из каждой строки вычитается среднее.
      Так за одну строку делается стандартизация признаков.
  - topic: programming
    uid: pandas_groupby
    difficulty: 2
    question: "Объясни паттерн split-apply-combine в pandas groupby."
    answer: |
      `groupby` работает в три шага:
        • split — разбить строки на группы по ключу (например, по категории);
        • apply — применить функцию к каждой группе (агрегация mean/sum/count,
          трансформация, фильтрация);
        • combine — собрать результаты обратно в DataFrame/Series.

      Пример: df.groupby("city")["salary"].mean() — средняя зарплата по городам.
      Это базовый инструмент для feature engineering (агрегаты по группам как
      новые признаки) и для разведочного анализа (EDA).
  - topic: programming
    uid: sql_join
    difficulty: 2
    question: "Чем отличаются INNER, LEFT, RIGHT и FULL JOIN в SQL?"
    answer: |
      JOIN соединяет строки двух таблиц по условию:
        • INNER — только строки, где совпадение есть в ОБЕИХ таблицах.
        • LEFT — все строки левой таблицы + совпавшие из правой (нет совпадения →
          NULL в полях правой).
        • RIGHT — наоборот: все строки правой + совпавшие из левой.
        • FULL — все строки обеих таблиц, несовпавшие дополняются NULL.

      На практике в подготовке данных чаще всего LEFT JOIN: «оставить все
      объекты, подтянуть фичи там, где есть». Важно следить за дублями ключей —
      JOIN может неожиданно размножить строки.
  - topic: programming
    uid: sql_window
    difficulty: 3
    question: "Зачем нужны оконные функции (window functions) в SQL?"
    answer: |
      Оконные функции считают агрегат «по окну» строк, НЕ схлопывая их в одну
      (в отличие от GROUP BY). Синтаксис: func() OVER (PARTITION BY ... ORDER BY ...).

      Примеры:
        • ROW_NUMBER()/RANK() — нумерация/ранжирование внутри группы.
        • SUM() OVER (...) — нарастающий итог.
        • LAG()/LEAD() — значение из предыдущей/следующей строки (для time series,
          расчёта дельт).

      Очень частый инструмент в аналитике и для построения признаков из
      событийных данных (например, «время с прошлой покупки клиента»).

  # --- Инструменты ---
  - topic: tools
    uid: git_basics
    difficulty: 1
    question: "В чём разница между git merge и git rebase?"
    answer: |
      Оба объединяют изменения из одной ветки в другую, но по-разному:
        • merge — создаёт merge-коммит, сохраняя реальную историю ветвления.
          История нелинейна, зато честная.
        • rebase — «переносит» твои коммиты поверх другой ветки, переписывая их.
          История получается линейной и чистой, но это перезапись (нельзя
          ребейзить уже запушенные общие ветки — поломаешь историю другим).

      Правило: rebase для локальной уборки до пуша, merge для интеграции в общие
      ветки. «Не ребейзь то, что уже опубликовано».
  - topic: tools
    uid: venv_why
    difficulty: 1
    question: "Зачем нужны виртуальные окружения (venv/conda) в Python-проектах?"
    answer: |
      Виртуальное окружение изолирует зависимости проекта от системного Python и
      других проектов. У каждого проекта свой набор библиотек нужных версий.

      Зачем:
        • Проект A требует numpy 1.26, проект B — numpy 2.0; без изоляции конфликт.
        • Воспроизводимость: `pip freeze > requirements.txt` фиксирует версии,
          и окружение восстанавливается один в один (важно для ML — результаты
          зависят от версий библиотек).

      conda дополнительно умеет ставить не-Python зависимости (CUDA, MKL).

  # --- Docker ---
  - topic: docker
    uid: docker_why
    difficulty: 2
    question: "Зачем нужен Docker в ML и чем контейнер отличается от виртуалки?"
    answer: |
      Docker упаковывает приложение со ВСЕМИ зависимостями (Python, библиотеки,
      системные пакеты, версии CUDA) в образ, который одинаково запускается где
      угодно — «у меня работает» больше не проблема.

      Контейнер vs виртуальная машина:
        • VM виртуализирует железо и тащит целую гостевую ОС → тяжёлая, медленный
          старт.
        • Контейнер использует ядро хоста, изолируя только процессы и ФС →
          лёгкий, стартует за секунды.

      В ML критично для воспроизводимости и деплоя моделей (обучил в том же
      окружении, в каком потом инференс).
  - topic: docker
    uid: docker_layers
    difficulty: 2
    question: "Что такое слои (layers) образа Docker и как они влияют на сборку?"
    answer: |
      Каждая инструкция в Dockerfile (FROM, COPY, RUN) создаёт слой. Слои
      кешируются: при пересборке Docker переиспользует неизменившиеся слои и
      пересобирает только начиная с первого изменившегося.

      Практический вывод — порядок инструкций важен:
        • сначала COPY requirements.txt + RUN pip install (меняется редко),
        • потом COPY остального кода (меняется часто).
      Тогда правка кода не триггерит переустановку всех зависимостей — сборка
      быстрая. Это ровно та оптимизация, что в нашем Dockerfile.
  - topic: docker
    uid: docker_volumes
    difficulty: 2
    question: "Зачем нужны volumes в Docker?"
    answer: |
      Файловая система контейнера эфемерна: остановил/пересоздал контейнер —
      данные внутри пропали. Volume — это постоянное хранилище, которое живёт
      отдельно от жизненного цикла контейнера и монтируется внутрь.

      Зачем в ML:
        • сохранять обученные модели, чекпойнты, логи, базу данных;
        • прокидывать датасет внутрь без копирования в образ.

      Именно поэтому локально мы монтируем data/ как volume — чтобы SQLite-база
      переживала пересборку контейнера.

  # --- Математика (основа) ---
  - topic: math_base
    uid: vector_dot_product
    difficulty: 2
    question: "Что геометрически означает скалярное произведение (dot product) и где оно в ML?"
    answer: |
      Скалярное произведение a·b = sum(a_i * b_i) = |a||b|cos(θ), где θ — угол
      между векторами.

      Смысл: насколько векторы «сонаправлены».
        • > 0 — острый угол (похожи по направлению),
        • = 0 — ортогональны (независимы),
        • < 0 — противоположны.

      Где в ML: вся линейная модель — это w·x (взвешенная сумма признаков);
      cosine similarity (a·b / |a||b|) меряет близость эмбеддингов в поиске/RAG;
      attention в трансформерах считает скалярные произведения query и key.
  - topic: math_base
    uid: matrix_multiplication
    difficulty: 2
    question: "Почему в ML почти всё выражают через умножение матриц?"
    answer: |
      Умножение матриц — это компактная запись множества скалярных произведений
      сразу. X @ W, где X (n объектов × d признаков), W (d × k весов), за одну
      операцию считает k линейных комбинаций для всех n объектов.

      Зачем:
        • Один forward-проход слоя нейросети = матричное умножение + нелинейность.
        • Это идеально ложится на GPU (тысячи параллельных перемножений) — отсюда
          ускорение обучения в десятки-сотни раз.

      Поэтому данные представляют тензорами, а вычисления — как цепочку
      матричных операций.
  - topic: math_base
    uid: eigen_svd
    difficulty: 3
    question: "Что такое собственные значения/векторы и SVD, зачем они в ML?"
    answer: |
      Собственный вектор v матрицы A не меняет направление при умножении:
      A·v = λ·v, где λ (собственное значение) — во сколько раз он растягивается.

      SVD (сингулярное разложение): любую матрицу X = U·Σ·Vᵀ, где Σ — диагональ
      сингулярных чисел (по сути «важность» направлений).

      Где в ML:
        • PCA = собственные векторы ковариационной матрицы (или SVD данных) →
          направления максимальной дисперсии для снижения размерности.
        • Рекомендательные системы: matrix factorization через усечённый SVD.
        • Понимание устойчивости/обусловленности задач.
  - topic: math_base
    uid: derivative_gradient
    difficulty: 2
    question: "Что такое градиент и почему обучение моделей — это про него?"
    answer: |
      Производная функции — скорость её изменения. Для функции многих переменных
      градиент ∇L — это вектор частных производных; он указывает направление
      САМОГО БЫСТРОГО роста функции.

      В обучении мы минимизируем loss L(w). Антиградиент −∇L указывает, куда
      шагнуть, чтобы ошибка убывала быстрее всего. Отсюда gradient descent:
        w := w − lr * ∇L(w)

      То есть «обучить модель» = численно найти минимум loss, двигаясь против
      градиента. Поэтому loss должен быть дифференцируемым.
  - topic: math_base
    uid: chain_rule
    difficulty: 3
    question: "Что такое chain rule (правило цепочки) и при чём тут нейросети?"
    answer: |
      Правило цепочки даёт производную композиции функций:
        если y = f(g(x)), то dy/dx = f'(g(x)) * g'(x).
      То есть производные перемножаются вдоль цепочки.

      Нейросеть — это длинная композиция: loss(f_n(...f_2(f_1(x)))). Чтобы узнать,
      как каждый вес влияет на loss, нужно протащить производную через все слои.
      Backpropagation — это и есть систематическое применение chain rule от loss
      к входу, переиспользуя промежуточные производные (динамическое
      программирование). Без него обучение глубоких сетей было бы невозможно.
  - topic: math_base
    uid: backprop_manual
    difficulty: 3
    question: "Опиши на пальцах, как backpropagation считает градиенты."
    answer: |
      Два прохода:
        1. Forward: прогоняем вход через сеть, считаем выход и loss, попутно
           СОХРАНЯЯ промежуточные значения (активации).
        2. Backward: идём от loss назад. На каждом узле берём градиент, пришедший
           сверху, умножаем на локальную производную узла (chain rule) и передаём
           дальше вниз. Так получаем ∂loss/∂w для каждого веса.

      Числовая интуиция: если узел z = w*x, и сверху пришёл градиент g = ∂L/∂z, то
      ∂L/∂w = g * x, а ∂L/∂x = g * w. Дальше g течёт ниже.

      Затем оптимайзер делает шаг: w := w − lr * ∂L/∂w. Ключ — переиспользование
      промежуточных производных, поэтому это эффективно.
  - topic: math_base
    uid: log_exp_intuition
    difficulty: 2
    question: "Почему в ML так часто встречаются логарифмы (log loss, log-likelihood)?"
    answer: |
      Три причины:
        • Произведения → суммы. Likelihood многих независимых событий — это
          произведение вероятностей; log превращает его в сумму log'ов, которую
          удобно дифференцировать и она численно устойчивее (нет underflow от
          перемножения крошечных чисел).
        • Удобные градиенты: log в паре с softmax/sigmoid даёт простые, выпуклые
          по параметрам функции потерь.
        • Информационный смысл: −log(p) — это «удивление» (information content);
          cross-entropy и KL-дивергенция строятся на логарифмах.

  # ===================== УРОВЕНЬ 1: МАТЕМАТИКА ML =====================

  # --- Теория вероятностей ---
  - topic: probability
    uid: prob_distributions
    difficulty: 2
    question: "Назови ключевые распределения и где они в ML."
    answer: |
      • Bernoulli — один бинарный исход (клик/не клик). Основа логистической
        регрессии.
      • Binomial — число успехов в n испытаниях Bernoulli.
      • Normal (Gaussian) — симметричное, по ЦПТ возникает из сумм; предположение
        о шуме в линейной регрессии, инициализация весов.
      • Categorical/Multinomial — выбор из k классов. Выход softmax.
      • Poisson — число событий за интервал (счётчики).
      • Exponential — время до события.

      Знание распределения подсказывает правильный loss (например, Bernoulli →
      log loss) и правильную модель.
  - topic: probability
    uid: conditional_prob
    difficulty: 2
    question: "Что такое условная вероятность и независимость событий?"
    answer: |
      Условная вероятность P(A|B) — вероятность A при условии, что B произошло:
        P(A|B) = P(A ∩ B) / P(B).

      События независимы, если P(A|B) = P(A), то есть знание о B не меняет
      вероятность A; тогда P(A ∩ B) = P(A)·P(B).

      В ML: почти все модели оценивают P(y|x) — вероятность таргета при данных
      признаках. Предположение об условной независимости признаков лежит в основе
      Naive Bayes (отсюда «naive»).
  - topic: probability
    uid: bayes_theorem
    difficulty: 3
    question: "Сформулируй теорему Байеса и объясни её части."
    answer: |
      P(A|B) = P(B|A) * P(A) / P(B)

      В терминах гипотезы H и данных D:
        posterior P(H|D) = likelihood P(D|H) * prior P(H) / evidence P(D)
        • prior — что мы думали о H до данных;
        • likelihood — насколько данные согласуются с H;
        • posterior — обновлённое мнение после данных.

      Это фундамент байесовского вывода: данные ОБНОВЛЯЮТ убеждения. Классический
      пример-ловушка: при редкой болезни даже точный тест даёт много ложных
      срабатываний, потому что мал prior P(болен).
  - topic: probability
    uid: expectation_variance
    difficulty: 2
    question: "Что такое мат. ожидание и дисперсия, зачем они нужны?"
    answer: |
      • Мат. ожидание E[X] = sum(x_i * p_i) — «среднее» значение случайной
        величины, центр распределения.
      • Дисперсия Var(X) = E[(X − E[X])²] — мера разброса вокруг среднего;
        стандартное отклонение σ = sqrt(Var) в тех же единицах, что X.

      Где в ML: bias-variance decomposition; минимизация MSE = оценка E[y|x];
      нормализация признаков использует среднее и дисперсию; в RL оцениваем
      ожидаемую награду. Линейность: E[aX+bY] = aE[X]+bE[Y] (всегда), а дисперсия
      складывается только для независимых.
  - topic: probability
    uid: covariance_correlation
    difficulty: 2
    question: "Чем ковариация отличается от корреляции?"
    answer: |
      • Ковариация Cov(X,Y) = E[(X−E[X])(Y−E[Y])] — знак показывает направление
        связи, но величина зависит от масштаба переменных (несравнима между
        парами).
      • Корреляция Пирсона ρ = Cov(X,Y) / (σ_X · σ_Y) — нормированная в [−1, 1],
        безразмерная, сравнимая.

      Важно: корреляция ловит только ЛИНЕЙНУЮ связь. ρ = 0 не значит
      независимость (может быть сильная нелинейная связь). И корреляция ≠
      причинность.
  - topic: probability
    uid: clt
    difficulty: 3
    question: "Что утверждает центральная предельная теорема (ЦПТ) и почему она важна?"
    answer: |
      ЦПТ: сумма (или среднее) большого числа независимых одинаково
      распределённых случайных величин стремится к нормальному распределению —
      НЕЗАВИСИМО от формы исходного распределения (при конечной дисперсии).

      Точнее: выборочное среднее ~ Normal(μ, σ²/n) при больших n.

      Почему важно: оправдывает использование нормального распределения и
      доверительных интервалов для средних; основа A/B-тестов (разница средних
      распределена нормально) и bootstrap. Поэтому «среднего по выборке» можно
      доверять тем больше, чем больше n (ошибка падает как 1/sqrt(n)).
  - topic: probability
    uid: naive_bayes
    difficulty: 2
    question: "Как работает Naive Bayes и почему он «наивный»?"
    answer: |
      По теореме Байеса классификатор оценивает P(class|features) ∝
      P(class) * P(features|class). «Наивное» предположение: признаки условно
      независимы при данном классе, поэтому
        P(features|class) = произведение P(feature_i|class).

      Это упрощение часто неверно, но на практике работает удивительно хорошо
      (особенно в текстах — спам-фильтры). Плюсы: очень быстрый, мало данных
      нужно, нет переобучения от лишних параметров. Минус: игнорирует
      взаимодействия признаков.

  # --- Статистика ---
  - topic: statistics
    uid: mle
    difficulty: 3
    question: "Что такое Maximum Likelihood Estimation (MLE)?"
    answer: |
      MLE — метод оценки параметров: выбираем такие параметры θ, при которых
      наблюдаемые данные наиболее вероятны.
        θ_MLE = argmax_θ P(data | θ)

      На практике максимизируют log-likelihood (произведение → сумма) или,
      эквивалентно, минимизируют отрицательный log-likelihood (NLL).

      Связь с ML: многие loss'ы — это NLL под определённым распределением. MSE в
      линейной регрессии = MLE при гауссовом шуме; log loss в логистической
      регрессии = MLE при Bernoulli. То есть loss'ы не выдуманы, а выводятся.
  - topic: statistics
    uid: mle_vs_map
    difficulty: 3
    question: "Чем MAP отличается от MLE?"
    answer: |
      MAP (Maximum A Posteriori) добавляет prior на параметры:
        θ_MAP = argmax_θ P(data|θ) * P(θ)
      MLE же максимизирует только P(data|θ) (как будто prior равномерный).

      Ключевая связь: MAP = MLE + регуляризация.
        • Гауссов prior на веса → L2-регуляризация (Ridge).
        • Лапласов prior → L1-регуляризация (Lasso).

      Интуиция: prior — это априорное мнение «веса скорее малы», которое держит
      модель от переобучения. При большом объёме данных likelihood доминирует и
      MAP → MLE.
  - topic: statistics
    uid: pvalue
    difficulty: 3
    question: "Что такое p-value и как его правильно интерпретировать?"
    answer: |
      p-value — вероятность увидеть эффект как минимум такой же сильный, как
      наблюдаемый, ЕСЛИ нулевая гипотеза (нет эффекта) верна.

      Маленький p (например < 0.05) → данные плохо согласуются с H0 → отвергаем
      H0. Но:
        • p-value НЕ вероятность того, что гипотеза верна.
        • Не отвергли ≠ доказали отсутствие эффекта.
        • Статистическая значимость ≠ практическая (при огромной выборке значимо
          даже ничтожное различие).

      Частая ловушка на собесе — спрашивают именно про неправильные трактовки.
  - topic: statistics
    uid: ab_test
    difficulty: 3
    question: "Как устроен A/B-тест и какие в нём подводные камни?"
    answer: |
      Делим пользователей случайно на контроль (A) и вариант (B), показываем
      разный опыт, сравниваем целевую метрику. Случайное разбиение уравнивает
      прочие факторы → разницу можно приписать изменению.

      Шаги: сформулировать гипотезу и метрику → посчитать нужный размер выборки
      (power analysis) → собрать данные → стат-тест (например, t-test) → решение.

      Подводные камни:
        • Peeking — подглядывание и остановка теста при «значимости» раздувает
          false positive. Размер выборки фиксируют заранее.
        • Множественные сравнения (много метрик/вариантов) → поправки.
        • Сетевые эффекты, сезонность, неоднородные группы.
  - topic: statistics
    uid: type_errors
    difficulty: 2
    question: "Что такое ошибки I и II рода?"
    answer: |
      • Ошибка I рода (false positive, α): отвергли H0, хотя она верна — «увидели
        эффект, которого нет». Уровень значимости α (обычно 0.05) — это её
        допустимая вероятность.
      • Ошибка II рода (false negative, β): не отвергли H0, хотя она ложна —
        «пропустили реальный эффект». Power (мощность) = 1 − β.

      Trade-off: ужесточая α (меньше ложных тревог), мы повышаем β (больше
      пропусков), и наоборот. Аналогия с классификацией: α ↔ precision-риск,
      β ↔ recall-риск. Больше данных снижает обе ошибки.
  - topic: statistics
    uid: bootstrap
    difficulty: 3
    question: "Что такое bootstrap и зачем он нужен?"
    answer: |
      Bootstrap — метод оценки неопределённости через ресемплинг: многократно
      берём выборки с возвращением того же размера из имеющихся данных, на каждой
      считаем статистику (среднее, метрику модели), и по разбросу этих оценок
      строим доверительный интервал.

      Зачем: не нужно предполагать распределение и выводить формулы аналитически —
      «пусть данные сами скажут». Работает почти для любой статистики.

      В ML: доверительные интервалы для метрик (например, ROC-AUC), оценка
      стабильности; bootstrap-выборки лежат в основе bagging / Random Forest.
  - topic: statistics
    uid: confidence_interval
    difficulty: 2
    question: "Как правильно понимать доверительный интервал (confidence interval)?"
    answer: |
      95% доверительный интервал — это интервал, построенный процедурой, которая
      в 95% повторных экспериментов накрывает истинный параметр.

      Важная тонкость: это утверждение о ПРОЦЕДУРЕ, а не «с вероятностью 95%
      параметр внутри этого конкретного интервала» (частотный подход). Истинный
      параметр фиксирован, случаен интервал.

      Практически: чем шире интервал, тем больше неопределённость; ширина падает
      с ростом выборки как 1/sqrt(n). Полезнее точечной оценки, потому что
      показывает надёжность.
  - topic: statistics
    uid: correlation_causation
    difficulty: 2
    question: "Почему «корреляция не равно причинность» и как ищут причинность?"
    answer: |
      Корреляция X и Y может возникать без того, что X вызывает Y:
        • обратная причинность (Y влияет на X);
        • общий конфаундер Z влияет на оба (мороженое и утопления коррелируют
          через лето);
        • случайность при множестве проверок.

      Золотой стандарт причинности — рандомизированный эксперимент (A/B-тест):
      случайное назначение воздействия разрывает связь с конфаундерами. Когда
      эксперимент невозможен — методы causal inference (matching, IV,
      difference-in-differences, DAG-и).

  # --- Оптимизация ---
  - topic: optimization
    uid: gradient_descent
    difficulty: 2
    question: "Как работает gradient descent и от чего зависит его сходимость?"
    answer: |
      Итеративно двигаем параметры против градиента loss:
        w := w − lr * ∇L(w)
      Градиент указывает направление роста, значит −∇L — направление убывания.
      Повторяем, пока не сойдёмся к минимуму.

      Сходимость зависит от:
        • learning rate (lr): слишком большой → расходимся/осцилляции, слишком
          малый → медленно.
        • Формы loss: выпуклая → один глобальный минимум; невыпуклая (нейросети) →
          локальные минимумы/седловые точки.
        • Масштаба признаков: ненормированные признаки → вытянутые «овраги»,
          зигзаги. Поэтому нормализация ускоряет обучение.
  - topic: optimization
    uid: gd_variants
    difficulty: 2
    question: "Чем отличаются batch, stochastic и mini-batch gradient descent?"
    answer: |
      Отличие — сколько данных используется для оценки градиента на шаге:
        • Batch GD — весь датасет. Точный градиент, но дорого и медленно, плохо
          для больших данных.
        • Stochastic (SGD) — один объект за шаг. Очень шумный градиент, но быстрый
          и шум помогает выскакивать из плохих минимумов.
        • Mini-batch — компромисс (например, 32–512 объектов). Стабильнее SGD,
          эффективно использует GPU (векторизация). Стандарт на практике.

      Шум mini-batch — это и регуляризатор, и способ не застрять.
  - topic: optimization
    uid: adam
    difficulty: 3
    question: "Чем Adam лучше обычного SGD? Что значат моменты?"
    answer: |
      Adam адаптирует шаг для каждого параметра, комбинируя две идеи:
        • Momentum (1-й момент): экспоненциальное среднее градиентов — инерция,
          сглаживает шум и ускоряет в стабильных направлениях.
        • RMSProp (2-й момент): экспоненциальное среднее КВАДРАТОВ градиентов —
          делим шаг на их корень, чтобы у «крутых» параметров шаг был меньше, у
          «пологих» больше.

      Итог: быстрая сходимость почти без ручного подбора lr, устойчивость к
      масштабам градиентов. AdamW дополнительно правильно отделяет weight decay
      от адаптивного шага — сейчас стандарт для трансформеров.
  - topic: optimization
    uid: learning_rate
    difficulty: 2
    question: "Почему learning rate — самый важный гиперпараметр, и что такое его расписание (schedule)?"
    answer: |
      lr задаёт размер шага. Слишком большой — loss скачет/расходится; слишком
      малый — обучение еле ползёт и может застрять. Поэтому его настраивают в
      первую очередь.

      Schedule — изменение lr во время обучения:
        • warmup — плавный рост в начале (стабилизирует старт, особенно у
          трансформеров);
        • decay (step/cosine) — снижение к концу, чтобы аккуратно «доехать» до
          минимума, не перепрыгивая его.

      Интуиция: сначала большими шагами в нужную область, потом мелкими —
      точно в минимум.
  - topic: optimization
    uid: convexity
    difficulty: 3
    question: "Что такое выпуклость (convexity) и почему она важна для оптимизации?"
    answer: |
      Функция выпукла, если отрезок между любыми двумя точками графика лежит не
      ниже самого графика. Ключевое свойство: у выпуклой функции любой локальный
      минимум является глобальным.

      Поэтому для выпуклых loss (линейная/логистическая регрессия с выпуклой
      регуляризацией) gradient descent гарантированно находит глобальный оптимум.

      Нейросети невыпуклы → много локальных минимумов и седловых точек. На
      практике спасает то, что в высокой размерности большинство локальных
      минимумов дают близкий к оптимальному loss, а шум SGD помогает не застрять.
  - topic: optimization
    uid: vanishing_gradient_opt
    difficulty: 3
    question: "Что такое затухающий и взрывающийся градиент (vanishing/exploding)?"
    answer: |
      В глубокой сети градиент идёт назад через много слоёв, перемножая локальные
      производные (chain rule). Если множители < 1 — произведение экспоненциально
      затухает (ранние слои почти не учатся); если > 1 — взрывается (расходимость,
      NaN).

      Лекарства:
        • активации ReLU вместо sigmoid/tanh (не насыщаются с одной стороны);
        • нормализация (Batch/LayerNorm);
        • residual connections (градиент течёт «в обход»);
        • правильная инициализация весов (He/Xavier);
        • gradient clipping против взрыва (особенно в RNN).

  # ===================== УРОВЕНЬ 2: КЛАССИЧЕСКИЙ ML =====================

  # --- С учителем ---
  - topic: supervised
    uid: ols_assumptions
    difficulty: 3
    question: "Какие ключевые предположения у линейной регрессии (OLS)?"
    answer: |
      • Линейность: связь между признаками и таргетом линейна по параметрам.
      • Независимость ошибок (нет автокорреляции остатков).
      • Гомоскедастичность: дисперсия ошибок постоянна (не растёт с x).
      • Нормальность остатков (нужна в основном для доверительных интервалов
        и тестов, не для самой оценки коэффициентов).
      • Отсутствие сильной мультиколлинеарности между признаками (иначе
        коэффициенты нестабильны).

      Если нарушены — оценки могут быть смещёнными/неэффективными, а p-values
      ненадёжными.
  - topic: supervised
    uid: mse_why
    difficulty: 2
    question: "Почему линейную регрессию обучают на MSE, а не на MAE? Плюсы и минусы."
    answer: |
      MSE = mean((y_pred - y_true)²), MAE = mean(|y_pred - y_true|).

      Почему чаще MSE:
        • Гладкая, всюду дифференцируемая → удобно для gradient descent и есть
          аналитическое решение (normal equation).
        • Сильнее штрафует крупные ошибки (квадрат) → модель их избегает.
        • Минимизация MSE даёт оценку условного среднего E[y|x].

      Минусы MSE: чувствительна к выбросам (один большой остаток в квадрате
      доминирует). MAE робастнее к выбросам и оценивает медиану, но негладкая
      в нуле и оптимизировать сложнее.
  - topic: supervised
    uid: logreg_why_not_mse
    difficulty: 3
    question: "Почему logistic regression обучают на log loss, а не на MSE?"
    answer: |
      Logistic regression предсказывает вероятность через sigmoid:
        p = 1 / (1 + e^(-w·x))

      Если взять MSE с sigmoid, loss получается невыпуклым по весам → gradient
      descent застревает в локальных минимумах. Log loss (binary cross-entropy):
        L = -[y·log(p) + (1-y)·log(1-p)]
      в паре с sigmoid даёт ВЫПУКЛУЮ функцию → один глобальный минимум, обучение
      устойчиво.

      Плюс log loss следует из maximum likelihood для Bernoulli-распределения —
      то есть это статистически обоснованный выбор, а не просто удобный.
  - topic: supervised
    uid: sigmoid
    difficulty: 2
    question: "Что делает sigmoid в логистической регрессии и как интерпретировать её выход?"
    answer: |
      Sigmoid: σ(z) = 1 / (1 + e^(-z)), где z = w·x + b — линейная комбинация.
      Она «сжимает» любое число из (-∞, +∞) в (0, 1), и выход трактуем как
      вероятность класса 1: p = P(y=1 | x).

      Решение о классе — порогом (обычно 0.5): p ≥ 0.5 → класс 1.
      Порог можно двигать под задачу (баланс precision/recall).

      Бонус: z = log(p / (1-p)) — это log-odds (логарифм шансов). Поэтому
      коэффициент w_i интерпретируется как изменение log-odds при росте x_i на 1.
  - topic: supervised
    uid: gini_entropy
    difficulty: 3
    question: "Как дерево решает, по какому признаку делать split? Что такое Gini и entropy?"
    answer: |
      Дерево на каждом узле перебирает признаки и пороги и выбирает split,
      который максимально снижает «загрязнённость» (impurity) дочерних узлов.

      Меры impurity для классификации:
        • Gini = 1 - sum(p_i²)  — вероятность ошибиться, если случайно навесить
          класс по распределению в узле. 0 — узел чистый.
        • Entropy = -sum(p_i · log2(p_i)) — мера неопределённости из теории
          информации.

      Выбирают split с максимальным information gain = impurity(родитель) −
      взвешенная impurity(детей). Gini и entropy на практике дают похожие деревья;
      Gini чуть дешевле считать (нет логарифма), поэтому он по умолчанию в sklearn.
  - topic: supervised
    uid: tree_overfit
    difficulty: 2
    question: "Почему деревья склонны к overfitting и как это ограничивают?"
    answer: |
      Дерево без ограничений может расти, пока каждый лист не станет чистым —
      по сути запоминает train целиком (ловит шум) → высокая variance.

      Ограничивают через гиперпараметры (pre-pruning):
        • max_depth — максимальная глубина.
        • min_samples_split / min_samples_leaf — минимум объектов для split / в листе.
        • max_features — сколько признаков рассматривать в узле.
      Либо post-pruning (cost-complexity pruning, ccp_alpha) — отрезают слабые
      ветви после построения. Радикальнее — не одно дерево, а ансамбль (Random
      Forest усредняет много деревьев и гасит variance).
  - topic: supervised
    uid: bagging_boosting
    difficulty: 3
    question: "В чём принципиальная разница между bagging и boosting?"
    answer: |
      Оба — ансамбли, но борются с разными частями ошибки и строятся по-разному:

      Bagging (например Random Forest):
        • Учим много моделей ПАРАЛЛЕЛЬНО и независимо на bootstrap-подвыборках.
        • Усредняем предсказания. Снижает в основном VARIANCE.
        • Базовые модели сильные, но переобученные (глубокие деревья) — усреднение
          их стабилизирует.

      Boosting (GBM, XGBoost, LightGBM):
        • Учим модели ПОСЛЕДОВАТЕЛЬНО, каждая следующая исправляет ошибки
          предыдущих (фокус на трудных объектах / на остатках градиента).
        • Снижает в основном BIAS (и часто финально лучше по качеству).
        • Базовые модели слабые (неглубокие деревья). Чувствительнее к шуму и
          требует аккуратной настройки (learning rate, число деревьев).
  - topic: supervised
    uid: rf_random
    difficulty: 2
    question: "За счёт чего Random Forest снижает корреляцию между деревьями?"
    answer: |
      Если просто обучить много деревьев на одних данных, они будут почти
      одинаковыми, и усреднение мало что даст. RF добавляет две случайности:

        1. Bootstrap (bagging): каждое дерево учится на выборке с возвращением
           из train (примерно 63% уникальных объектов).
        2. Random subspace: в каждом split рассматривается только случайное
           подмножество признаков (max_features), а не все.

      Это делает деревья РАЗНЫМИ (декоррелирует их). Усреднение независимых
      ошибок сильнее снижает variance ансамбля. Бонус — объекты, не попавшие в
      bootstrap (out-of-bag), дают бесплатную оценку качества.
  - topic: supervised
    uid: gradient_boosting
    difficulty: 3
    question: "Как работает gradient boosting? Чем XGBoost/CatBoost хороши?"
    answer: |
      Gradient boosting строит ансамбль последовательно: каждое новое дерево
      обучается предсказывать ОТРИЦАТЕЛЬНЫЙ градиент loss по текущему ансамблю
      (для MSE это просто остатки). Прибавляем дерево с шагом learning_rate.
      Так модель шаг за шагом уменьшает ошибку — это GD в пространстве функций.

      XGBoost/LightGBM/CatBoost — эффективные реализации с регуляризацией,
      обработкой пропусков, гистограммным поиском сплитов. CatBoost силён на
      категориальных фичах (ordered target encoding без leakage). На табличных
      данных бустинги — топ-выбор и часто бьют нейросети.
  - topic: supervised
    uid: knn
    difficulty: 2
    question: "Как работает k-NN и какие у него плюсы/минусы?"
    answer: |
      k-NN (k ближайших соседей) — ленивый алгоритм: не обучается, а на предсказании
      находит k ближайших объектов train (по расстоянию) и голосует
      (классификация) или усредняет (регрессия).

      Плюсы: прост, без обучения, ловит сложные нелинейные границы.
      Минусы:
        • дорогой инференс (поиск соседей по всей выборке);
        • страдает от curse of dimensionality (в многомерье все точки «далеко»);
        • чувствителен к масштабу признаков → нужна нормализация;
        • k мал → шумно (overfit), k велик → сглаживает (underfit).
  - topic: supervised
    uid: svm
    difficulty: 3
    question: "В чём идея SVM и что такое kernel trick?"
    answer: |
      SVM ищет разделяющую гиперплоскость с МАКСИМАЛЬНЫМ зазором (margin) между
      классами — это даёт хорошую обобщающую способность. Опираются только на
      граничные объекты — support vectors.

      Kernel trick: чтобы разделять нелинейно разделимые данные, их неявно
      проецируют в пространство более высокой размерности. Ядро (RBF, полином)
      считает скалярные произведения в этом пространстве БЕЗ явного перехода туда —
      экономит вычисления.

      Плюс soft-margin (параметр C) допускает ошибки ради устойчивости. SVM хорош
      на средних выборках с чёткой границей; тяжело масштабируется на огромные данные.
  - topic: supervised
    uid: feature_importance
    difficulty: 2
    question: "Как оценить важность признаков и в чём подвох встроенной importance у деревьев?"
    answer: |
      Способы:
        • Встроенная (impurity-based) у деревьев: суммарное снижение impurity по
          сплитам признака. Подвох: завышает важность признаков с большим числом
          уникальных значений и нестабильна при коррелированных фичах.
        • Permutation importance: насколько падает метрика, если перемешать
          значения признака. Честнее, модель-агностична.
        • SHAP: вклад каждого признака в КАЖДОЕ предсказание на основе теории игр.
          Лучшая интерпретируемость, но дороже.

      На собесе ценят понимание, что «importance ≠ причинность» и что
      коррелированные фичи делят важность между собой.

  # --- Без учителя ---
  - topic: unsupervised
    uid: kmeans
    difficulty: 2
    question: "Как работает K-Means и какие у него ограничения?"
    answer: |
      Итеративно: (1) фиксируем k центров, относим каждую точку к ближайшему;
      (2) пересчитываем центры как средние своих кластеров. Повторяем до
      стабилизации. По сути минимизирует суммарное квадратичное расстояние внутри
      кластеров (inertia).

      Ограничения:
        • k задаём заранее (выбор через elbow / silhouette);
        • предполагает выпуклые, примерно шарообразные кластеры схожего размера;
        • чувствителен к инициализации (спасает k-means++) и к масштабу (нужна
          нормализация);
        • плохо с кластерами сложной формы (там лучше DBSCAN).
  - topic: unsupervised
    uid: dbscan
    difficulty: 2
    question: "Чем DBSCAN отличается от K-Means?"
    answer: |
      DBSCAN кластеризует по плотности: точка — «ядро», если в радиусе eps у неё
      не меньше min_samples соседей; связные плотные области образуют кластер,
      а редкие точки помечаются как шум (выбросы).

      Отличия от K-Means:
        • не нужно задавать число кластеров k;
        • находит кластеры произвольной формы (не только шары);
        • умеет помечать выбросы;
        • но чувствителен к параметрам eps/min_samples и плохо работает при
          сильно разной плотности кластеров и в высокой размерности.
  - topic: unsupervised
    uid: pca
    difficulty: 3
    question: "Что делает PCA и как выбрать число компонент?"
    answer: |
      PCA находит новые ортогональные оси (главные компоненты) — направления
      максимальной дисперсии данных. Проецируя на первые несколько компонент,
      снижаем размерность, сохраняя как можно больше информации (дисперсии).
      Математически — собственные векторы ковариационной матрицы / SVD.

      Число компонент: по доле объяснённой дисперсии (например, оставить 95%) —
      смотрят кумулятивный график (scree plot).

      Важно: PCA чувствителен к масштабу → сначала стандартизация. Компоненты —
      линейные комбинации, теряется интерпретируемость. Ловит только линейную
      структуру (для нелинейной — t-SNE/UMAP, автоэнкодеры).
  - topic: unsupervised
    uid: tsne_umap
    difficulty: 2
    question: "Зачем нужны t-SNE и UMAP и чем они отличаются от PCA?"
    answer: |
      t-SNE и UMAP — нелинейные методы визуализации многомерных данных в 2D/3D.
      Они сохраняют ЛОКАЛЬНУЮ структуру: близкие в исходном пространстве точки
      остаются близкими на картинке. Отлично показывают кластеры (например,
      эмбеддинги).

      Отличие от PCA: PCA линеен и сохраняет глобальную дисперсию; t-SNE/UMAP
      ловят нелинейные многообразия.

      Осторожно: расстояния между кластерами и их размеры на t-SNE НЕ
      интерпретируемы (зависят от perplexity); это инструмент визуализации, не
      препроцессинг для модели. UMAP быстрее и лучше сохраняет глобальную структуру.
  - topic: unsupervised
    uid: clustering_eval
    difficulty: 2
    question: "Как оценить качество кластеризации без меток?"
    answer: |
      Внутренние метрики (без ground truth):
        • Silhouette score — насколько объект ближе к своему кластеру, чем к
          соседнему (от −1 до 1, выше лучше).
        • Davies-Bouldin, Calinski-Harabasz — отношение внутри/межкластерного
          разброса.
        • Elbow на inertia — ищем «локоть», где добавление кластера перестаёт
          сильно снижать ошибку.

      Если метки всё же есть — внешние метрики (ARI, NMI). Главное: кластеризация
      без чёткой бизнес-цели легко превращается в «красивые картинки без пользы».
  - topic: unsupervised
    uid: curse_dimensionality
    difficulty: 3
    question: "Что такое проклятие размерности (curse of dimensionality)?"
    answer: |
      С ростом числа признаков объём пространства растёт экспоненциально, и
      данные становятся разреженными — точки оказываются «далеко» друг от друга,
      а расстояния теряют различимость (все примерно равны).

      Последствия:
        • методы на расстояниях (k-NN, K-Means) деградируют;
        • нужно экспоненциально больше данных, чтобы покрыть пространство;
        • растёт риск overfitting.

      Лекарства: снижение размерности (PCA/UMAP), feature selection,
      регуляризация, осмысленный feature engineering.

  # --- Теория ML ---
  - topic: ml_theory
    uid: bv_tradeoff
    difficulty: 2
    question: "Что такое bias-variance tradeoff? Из чего складывается ошибка модели?"
    answer: |
      Ожидаемую ошибку модели на новых данных можно разложить на три части:
        Error = Bias² + Variance + Irreducible error

      • Bias (смещение) — ошибка из-за слишком простых предположений модели.
        Высокий bias → underfitting: модель не улавливает зависимость
        (пример: линейная регрессия на явно нелинейных данных).
      • Variance (разброс) — чувствительность к конкретной обучающей выборке.
        Высокая variance → overfitting: модель ловит шум, на новых данных плохо
        (пример: глубокое дерево без ограничений).
      • Irreducible error — шум в данных, его не убрать никакой моделью.

      Tradeoff: усложняя модель, мы снижаем bias, но растим variance, и наоборот.
      Цель — минимум суммы, а не любой из частей по отдельности.
  - topic: ml_theory
    uid: bv_diagnose
    difficulty: 3
    question: "Как по learning curves понять, у модели проблема с bias или с variance?"
    answer: |
      Смотрим на train error и validation error при росте объёма данных:

      • Высокий bias (underfitting): обе ошибки высокие и близки друг к другу,
        кривые рано выходят на плато. Больше данных НЕ поможет — нужна более
        сложная модель / новые features.
      • Высокая variance (overfitting): train error низкий, validation заметно
        выше, между ними большой gap. Помогает: больше данных, регуляризация,
        упрощение модели.
  - topic: ml_theory
    uid: l1_l2
    difficulty: 3
    question: "Чем отличаются L1 (Lasso) и L2 (Ridge) регуляризация? Когда какую брать?"
    answer: |
      Обе добавляют штраф за большие веса в loss, но штраф разный:
        • L2 (Ridge): + lambda * sum(w_i²) — штрафует квадрат весов.
        • L1 (Lasso): + lambda * sum(|w_i|) — штрафует модуль весов.

      Ключевая разница:
        • L2 равномерно «сжимает» веса к нулю, но не обнуляет их полностью.
        • L1 умеет зануливать веса ровно в 0 → автоматический feature selection
          (разреженная модель). Геометрически: ромбовидная область ограничения
          у L1 имеет «углы» на осях, и оптимум часто попадает в них.

      Когда что:
        • Много признаков, подозреваешь что часть бесполезна → L1.
        • Признаки коррелируют, хочешь устойчивости → L2.
        • Хочешь и то и то → Elastic Net (комбинация L1+L2).
  - topic: ml_theory
    uid: overfit_signs
    difficulty: 2
    question: "Как обнаружить overfitting и какие есть способы с ним бороться?"
    answer: |
      Признак: большой разрыв между метрикой на train (хорошо) и на
      validation/test (заметно хуже).

      Способы борьбы:
        • Больше данных / data augmentation.
        • Регуляризация (L1/L2, dropout в нейросетях).
        • Упростить модель (меньше глубина дерева, меньше признаков).
        • Early stopping (остановить обучение, когда val-метрика перестала расти).
        • Cross-validation для честной оценки.
        • Feature selection / снижение размерности.
  - topic: ml_theory
    uid: kfold
    difficulty: 2
    question: "Что такое k-fold cross-validation и зачем он нужен?"
    answer: |
      Делим данные на k частей (folds). Обучаем k раз: каждый раз одна часть —
      validation, остальные k-1 — train. Итоговая метрика — среднее по k прогонам.

      Зачем:
        • Оценка качества устойчивее, чем по одному train/test split (меньше
          зависит от удачного/неудачного деления).
        • Каждый объект ровно один раз побывал в validation.
        • Видно разброс метрики между folds (стабильна ли модель).

      Типичный k = 5 или 10. Минус — обучаем модель k раз (дороже).
  - topic: ml_theory
    uid: leakage
    difficulty: 3
    question: "Что такое data leakage и как его не допустить при cross-validation?"
    answer: |
      Data leakage — когда в обучение просачивается информация, недоступная в
      реальном применении (или из validation/test). Модель показывает завышенное
      качество, а в проде проваливается.

      Частые источники:
        • Препроцессинг (scaling, encoding, заполнение пропусков, отбор фич) на
          ВСЕХ данных до разбиения → статистики test «подсмотрены».
        • Признаки, которых не будет на момент предсказания (target leakage).

      Как избежать: любой fit препроцессинга — только на train-части каждого
      fold. В sklearn для этого Pipeline + cross_val_score: внутри CV препроцессинг
      переобучается на каждом fold отдельно.
  - topic: ml_theory
    uid: scaling_when
    difficulty: 2
    question: "Каким моделям нужно масштабирование признаков, а каким нет? Почему?"
    answer: |
      Масштабирование (StandardScaler, MinMaxScaler) ВАЖНО для моделей, которые
      опираются на расстояния или на величину весов:
        • KNN, K-Means, SVM (RBF) — считают расстояния, признак с большим
          масштабом доминирует.
        • Linear/Logistic regression с регуляризацией — штраф зависит от величины
          весов, а значит и от масштаба признаков.
        • Gradient descent сходится быстрее на нормированных признаках.
        • PCA — ищет направления максимальной дисперсии, чувствителен к масштабу.

      НЕ нужно деревьям и ансамблям на деревьях (Decision Tree, Random Forest,
      Gradient Boosting): они делят по порогам признака по отдельности, и
      монотонное преобразование шкалы split-ы не меняет.

      Важно: scaler фитим на train, применяем к test (иначе data leakage).
  - topic: ml_theory
    uid: imbalanced
    difficulty: 3
    question: "Как бороться с дисбалансом классов?"
    answer: |
      Проблема: при 99% негативов модель, всегда предсказывающая негатив, даёт
      99% accuracy, но бесполезна.

      Подходы:
        • Метрики: смотреть precision/recall/F1/PR-AUC, а не accuracy.
        • Ресемплинг: oversampling редкого класса (SMOTE — синтетика), либо
          undersampling частого.
        • Веса классов: class_weight='balanced' — штрафовать ошибки на редком
          классе сильнее.
        • Порог: двигать threshold под нужный баланс precision/recall.

      Важно: ресемплинг — только на train, внутри CV, иначе leakage. Часто
      достаточно весов классов + правильного порога.
  - topic: ml_theory
    uid: encoding_categorical
    difficulty: 2
    question: "Как кодировать категориальные признаки? Плюсы и минусы способов."
    answer: |
      • One-hot encoding — по бинарному столбцу на категорию. Просто, без ложного
        порядка, но при высокой кардинальности раздувает размерность.
      • Label/Ordinal — номер категории. Компактно, но навязывает ложный порядок
        (плохо для линейных моделей; ок для деревьев).
      • Target/Mean encoding — заменить категорию средним таргетом по ней. Мощно
        при высокой кардинальности, НО риск target leakage → нужен out-of-fold /
        сглаживание (CatBoost делает это «из коробки»).
      • Hashing — для огромного числа категорий.

      Выбор зависит от модели и кардинальности.

  # --- Метрики ---
  - topic: metrics
    uid: precision_recall
    difficulty: 2
    question: "В чём разница между precision и recall? Когда что важнее?"
    answer: |
      По confusion matrix (TP, FP, FN, TN):
        • Precision = TP / (TP + FP) — из тех, кого назвали положительными,
          сколько действительно положительные. «Не поднимать ложную тревогу».
        • Recall   = TP / (TP + FN) — из всех реально положительных сколько мы
          поймали. «Не пропустить».

      Когда что важнее:
        • Recall важнее, когда дорог пропуск (медицина: не пропустить болезнь;
          fraud: не пропустить мошенничество).
        • Precision важнее, когда дорога ложная тревога (спам-фильтр: не закинуть
          важное письмо в спам).

      Компромисс — F1 = 2·P·R / (P+R), гармоническое среднее.
  - topic: metrics
    uid: roc_auc
    difficulty: 3
    question: "Что показывает ROC-AUC и почему он устойчив к дисбалансу классов?"
    answer: |
      ROC-кривая — это TPR (recall) по оси Y против FPR = FP/(FP+TN) по оси X при
      переборе всех порогов. AUC — площадь под ней.

      Интерпретация AUC: вероятность, что случайный положительный объект получит
      бо́льший score, чем случайный отрицательный. AUC = 0.5 — случайно, 1.0 —
      идеально.

      Почему устойчив к дисбалансу: TPR и FPR считаются ВНУТРИ своих классов
      (нормированы на размер класса), поэтому пропорция классов на них не влияет
      напрямую. Важная оговорка: при сильном дисбалансе ROC-AUC может быть
      оптимистичным — тогда честнее PR-AUC (precision-recall), он чувствительнее
      к редкому положительному классу.
  - topic: metrics
    uid: f1_score
    difficulty: 2
    question: "Почему F1 — это гармоническое среднее, а не обычное?"
    answer: |
      F1 = 2·P·R / (P + R) — гармоническое среднее precision и recall.

      Гармоническое среднее «тянет» к меньшему из двух чисел: если precision=1.0,
      а recall=0.0, обычное среднее дало бы 0.5 (обманчиво неплохо), а F1 = 0.
      То есть F1 высок, только когда ОБА показателя высоки — нельзя «выехать» за
      счёт одного.

      Когда precision и recall не равноценны — используют F_beta (beta>1 — вес
      recall, beta<1 — вес precision).
  - topic: metrics
    uid: regression_metrics_compare
    difficulty: 2
    question: "Сравни MSE, RMSE, MAE и MAPE для регрессии."
    answer: |
      • MSE = mean((y−ŷ)²) — квадратичная, сильно штрафует крупные ошибки,
        чувствительна к выбросам; в квадрате единиц.
      • RMSE = sqrt(MSE) — то же, но в исходных единицах (интерпретируемее).
      • MAE = mean(|y−ŷ|) — средняя абсолютная ошибка, робастна к выбросам,
        в исходных единицах; оценивает медиану.
      • MAPE = mean(|y−ŷ|/|y|) — в процентах, сравнима между задачами, но ломается
        при y близких к 0 и асимметрична.

      Выбор: важны крупные ошибки → RMSE/MSE; есть выбросы → MAE; нужна
      относительная ошибка → MAPE (если y далёк от нуля).
  - topic: metrics
    uid: r2
    difficulty: 2
    question: "Что такое R² (коэффициент детерминации) и как его читать?"
    answer: |
      R² = 1 - SS_res / SS_tot, где
        SS_res = sum((y - y_pred)²)  — ошибка модели,
        SS_tot = sum((y - ȳ)²)       — ошибка «тупого» предсказания средним.

      Смысл: какую долю дисперсии таргета объясняет модель.
        • R² = 1 — идеально; R² = 0 — модель не лучше предсказания средним.
        • R² < 0 — модель ХУЖЕ, чем просто среднее (бывает на test).

      Подвох: R² не убывает при добавлении любых признаков на train → для сравнения
      моделей с разным числом фич берут Adjusted R² (штрафует за лишние признаки).
  - topic: metrics
    uid: confusion_matrix
    difficulty: 1
    question: "Что такое confusion matrix и какие метрики из неё выводятся?"
    answer: |
      Таблица 2×2 (для бинарной задачи) сопоставляет предсказания и факт:
        • TP — верно предсказали положительный,
        • TN — верно предсказали отрицательный,
        • FP — ложная тревога (предсказали +, на деле −),
        • FN — пропуск (предсказали −, на деле +).

      Из неё:
        • Accuracy = (TP+TN)/всего,
        • Precision = TP/(TP+FP),
        • Recall (TPR) = TP/(TP+FN),
        • Specificity (TNR) = TN/(TN+FP).

      Это базовый инструмент диагностики: видно, КАКИЕ именно ошибки делает модель.
  - topic: metrics
    uid: accuracy_trap
    difficulty: 2
    question: "Почему accuracy — обманчивая метрика?"
    answer: |
      Accuracy = доля верных предсказаний. Проблема — при дисбалансе классов она
      вводит в заблуждение: если 99% объектов класса 0, модель «всегда 0» даёт
      99% accuracy, но не ловит ни одного важного положительного случая.

      Поэтому при дисбалансе/разной цене ошибок смотрят precision, recall, F1,
      ROC-AUC или PR-AUC, а также саму confusion matrix. Accuracy уместна лишь
      когда классы сбалансированы и цена ошибок симметрична.

  # --- Semi-supervised ---
  - topic: semi_supervised
    uid: semi_supervised_idea
    difficulty: 2
    question: "Что такое semi-supervised learning и когда оно полезно?"
    answer: |
      Semi-supervised использует МАЛО размеченных + МНОГО неразмеченных данных.
      Идея: структура неразмеченных данных (плотности, кластеры) помогает учиться,
      когда разметка дорогая.

      Приёмы:
        • Pseudo-labeling — обучить модель на размеченном, разметить ею уверенные
          неразмеченные примеры, дообучить.
        • Consistency regularization (MixMatch/FixMatch) — модель должна давать
          одинаковый ответ на аугментациях одного объекта.

      Полезно в медицине, NLP, CV, где разметка требует экспертов и времени.

  # ===================== УРОВЕНЬ 2.5: ВЕРОЯТНОСТНЫЙ ML =====================

  # --- Байесовский подход ---
  - topic: bayesian
    uid: bayesian_vs_frequentist
    difficulty: 3
    question: "Чем байесовский подход отличается от частотного (frequentist)?"
    answer: |
      • Частотный: параметр — фиксированное неизвестное число; вероятность — это
        частота в повторных экспериментах. Оцениваем точечно (MLE) + доверительные
        интервалы.
      • Байесовский: параметр — случайная величина с распределением. Задаём prior
        (априорное мнение), наблюдаем данные, получаем posterior P(θ|data) по
        теореме Байеса.

      Байес даёт полное распределение (а не точку) → честная оценка
      неопределённости, естественно включает априорные знания, удобен при малых
      данных. Цена — вычислительная сложность (интегралы) и субъективность prior.
  - topic: bayesian
    uid: prior_posterior
    difficulty: 3
    question: "Что такое prior, likelihood и posterior?"
    answer: |
      posterior ∝ likelihood × prior:
        • Prior P(θ) — что мы думаем о параметре ДО данных (например, «вес скорее
          близок к 0»).
        • Likelihood P(data|θ) — насколько данные вероятны при данном θ.
        • Posterior P(θ|data) — обновлённое мнение ПОСЛЕ данных.

      Интуиция: posterior — компромисс между prior и данными. Мало данных → prior
      сильно влияет; много данных → likelihood доминирует, posterior сходится к
      MLE. Из posterior берут среднее/моду (MAP) как оценку и считают
      неопределённость.
  - topic: bayesian
    uid: conjugate_prior
    difficulty: 3
    question: "Что такое сопряжённые распределения (conjugate priors)?"
    answer: |
      Prior сопряжён к likelihood, если posterior принадлежит тому же семейству,
      что и prior. Тогда обновление по Байесу — это просто пересчёт параметров,
      без тяжёлых интегралов.

      Классический пример: Beta-prior + Bernoulli/Binomial-likelihood →
      Beta-posterior. Beta(a, b) после k успехов и m неудач → Beta(a+k, b+m).
      Интуиция: a−1 и b−1 — это «псевдо-наблюдения» успехов/неудач.

      Другой: Normal + Normal → Normal. Сопряжённость даёт аналитику и интуицию,
      но в сложных моделях её нет → нужны MCMC/variational методы.

  # --- Приближённый вывод ---
  - topic: approx_inference
    uid: mcmc
    difficulty: 3
    question: "Зачем нужен MCMC и как он работает на пальцах?"
    answer: |
      Часто posterior нельзя посчитать аналитически (интеграл-нормировка
      неберущийся). MCMC (Markov Chain Monte Carlo) не вычисляет распределение,
      а УМЕЕТ СЭМПЛИРОВАТЬ из него.

      Идея: строим марковскую цепь, чьё стационарное распределение = целевой
      posterior. Блуждаем по пространству параметров, принимая/отклоняя шаги так,
      чтобы чаще бывать в областях высокой вероятности (Metropolis-Hastings, Gibbs,
      HMC/NUTS). Набор сэмплов аппроксимирует posterior → по ним считаем среднее,
      интервалы.

      Плюс: точно (асимптотически). Минус: медленно, нужна диагностика сходимости.
  - topic: approx_inference
    uid: variational_inference
    difficulty: 3
    question: "Что такое variational inference и чем оно отличается от MCMC?"
    answer: |
      Variational Inference (VI) превращает вывод в ОПТИМИЗАЦИЮ: приближаем
      сложный posterior p простым параметрическим распределением q (например,
      гауссовым) и подбираем q, минимизируя KL-дивергенцию KL(q || p).

      MCMC vs VI:
        • MCMC — сэмплирует, асимптотически точен, но медленный.
        • VI — оптимизирует, быстрый и масштабируемый, но даёт приближение
          (часто недооценивает дисперсию).

      VI лежит в основе VAE. Выбор: нужна скорость на больших данных → VI; нужна
      точность → MCMC.
  - topic: approx_inference
    uid: elbo
    difficulty: 3
    question: "Что такое ELBO и почему его максимизируют?"
    answer: |
      ELBO (Evidence Lower BOund) — нижняя граница логарифма правдоподобия данных
      log p(x). Прямо log p(x) (evidence) считать тяжело (интеграл), поэтому
      максимизируют ELBO.

      ELBO = E_q[log p(x|z)] − KL(q(z) || p(z)):
        • первый член — насколько хорошо реконструируем данные (reconstruction);
        • второй — насколько приближённое q близко к prior (регуляризация).

      Связь: log p(x) = ELBO + KL(q || posterior). Так как KL ≥ 0, ELBO ≤ log p(x),
      и максимизация ELBO одновременно поджимает KL → q приближает posterior. Это
      и есть loss VAE.

  # --- Графические модели ---
  - topic: graphical_models
    uid: bayesian_networks
    difficulty: 3
    question: "Что такое байесовские сети (Bayesian networks)?"
    answer: |
      Байесовская сеть — направленный ацикличный граф (DAG), где узлы — случайные
      величины, рёбра — прямые вероятностные зависимости. Совместное распределение
      факторизуется как произведение P(узел | его родители).

      Это компактно кодирует условные независимости: узел независим от
      «не-потомков» при известных родителях. Вместо огромной таблицы совместного
      распределения храним маленькие условные.

      Применение: диагностика, экспертные системы, причинно-следственный анализ
      (causal DAG). Позволяет отвечать на запросы P(причина | симптомы).
  - topic: graphical_models
    uid: hmm
    difficulty: 3
    question: "Как устроена скрытая марковская модель (HMM)?"
    answer: |
      HMM моделирует последовательность: есть скрытые состояния (которые мы не
      видим) и наблюдения (которые видим). Два предположения:
        • Марковость: следующее состояние зависит только от текущего (матрица
          переходов).
        • Наблюдение зависит только от текущего состояния (матрица эмиссий).

      Задачи: оценить вероятность последовательности (forward), найти самую
      вероятную цепочку состояний (Viterbi), обучить параметры (Baum-Welch).

      Применялась в распознавании речи, POS-теггинге, биоинформатике. Сейчас в
      NLP вытеснена трансформерами, но как концепция спрашивается.
  - topic: graphical_models
    uid: mrf
    difficulty: 3
    question: "Чем марковские случайные поля (MRF) отличаются от байесовских сетей?"
    answer: |
      • Байесовские сети — НАПРАВЛЕННЫЙ граф (DAG): рёбра задают направление
        зависимости, естественно для причинности.
      • Марковские поля (MRF) — НЕНАПРАВЛЕННЫЙ граф: моделируют симметричные
        взаимосвязи. Совместное распределение факторизуется по кликам через
        потенциалы (не обязательно вероятности) с нормировкой Z.

      MRF удобны там, где связи без направления — например, пиксели изображения
      влияют на соседей (сегментация, denoising). Минус — вычисление нормировки Z
      обычно трудное.

  # --- Гауссовы процессы ---
  - topic: gaussian_processes
    uid: gp_regression
    difficulty: 3
    question: "Что такое гауссов процесс (GP) и его главная фишка?"
    answer: |
      Гауссов процесс — это распределение НАД ФУНКЦИЯМИ. Вместо подбора весов мы
      сразу задаём распределение возможных функций, и любое конечное множество
      точек имеет совместное нормальное распределение, заданное функцией ядра
      (kernel), которая меряет схожесть точек.

      Главная фишка: GP даёт не только предсказание, но и НЕОПРЕДЕЛЁННОСТЬ в каждой
      точке — там, где мало данных, доверительный интервал широкий.

      Минус: вычислительная сложность O(n³) от числа точек → плохо масштабируется.
      Хорош на малых данных, где важна калиброванная неопределённость.
  - topic: gaussian_processes
    uid: gp_kernels
    difficulty: 3
    question: "Какую роль играет kernel в гауссовом процессе?"
    answer: |
      Kernel k(x, x') задаёт, насколько похожи (коррелированы) значения функции в
      точках x и x'. Он кодирует наши предположения о функции: гладкость,
      периодичность, масштаб изменений.

      Пример: RBF-ядро exp(−|x−x'|²/2ℓ²) — близкие точки сильно коррелируют →
      гладкие функции; параметр длины ℓ задаёт «как быстро» функция меняется.

      Выбор и настройка ядра (через maximum likelihood) — главный способ заложить
      индуктивное смещение в GP. Ядра можно складывать/умножать, комбинируя
      свойства (тренд + периодичность).
  - topic: gaussian_processes
    uid: bayesian_optimization
    difficulty: 3
    question: "Как работает байесовская оптимизация и где она применяется?"
    answer: |
      Байесовская оптимизация ищет максимум дорогой «чёрной» функции (например,
      качество модели как функция гиперпараметров) за минимум вычислений.

      Цикл: (1) суррогатной моделью (часто GP) аппроксимируем функцию по уже
      опробованным точкам; (2) acquisition-функция (Expected Improvement, UCB)
      выбирает следующую точку, балансируя exploration (где неопределённость
      высока) и exploitation (где предсказано хорошо); (3) пробуем, обновляем.

      Применение: tuning гиперпараметров (Optuna и др.), эксперименты, где каждый
      замер дорогой. Эффективнее grid/random search по числу проб.

  # ===================== УРОВЕНЬ 3: ГЛУБОКОЕ ОБУЧЕНИЕ =====================

  # --- Основы нейросетей ---
  - topic: nn_basics
    uid: neuron
    difficulty: 2
    question: "Что такое нейрон и почему без нелинейности сеть бесполезна?"
    answer: |
      Нейрон считает взвешенную сумму входов плюс смещение и пропускает через
      функцию активации: a = f(w·x + b).

      Без нелинейной f любая глубокая сеть схлопывается в одну линейную операцию:
      композиция линейных функций — снова линейная функция. То есть 100 слоёв без
      активаций = обычная линейная регрессия, не способная к сложным границам.

      Именно нелинейные активации (ReLU и др.) дают сети выразительность —
      аппроксимировать произвольные функции (universal approximation).
  - topic: nn_basics
    uid: activations
    difficulty: 2
    question: "Сравни sigmoid, tanh и ReLU как функции активации."
    answer: |
      • Sigmoid (0..1): насыщается на краях → градиент затухает (vanishing),
        выход не центрирован в нуле. Сейчас в скрытых слоях избегают; уместна на
        выходе для вероятности.
      • Tanh (−1..1): центрирован в нуле (лучше sigmoid), но тоже насыщается.
      • ReLU = max(0, x): не насыщается при x>0, дешёвая, ускоряет сходимость —
        дефолт для скрытых слоёв. Минус — «мёртвые» нейроны (при x<0 градиент 0);
        лечится Leaky ReLU / GELU.

      GELU/SiLU — гладкие варианты, стандарт в трансформерах.
  - topic: nn_basics
    uid: softmax
    difficulty: 2
    question: "Что делает softmax и где он применяется?"
    answer: |
      Softmax превращает вектор «сырых» оценок (logits) в распределение
      вероятностей по классам:
        softmax(z_i) = e^(z_i) / sum_j e^(z_j)
      Все выходы в (0,1) и суммируются в 1; больший logit → большая вероятность.

      Применение: выходной слой многоклассовой классификации (в паре с
      cross-entropy loss), а также attention в трансформерах (нормирует веса
      внимания). На практике используют «log-softmax + NLL» для численной
      устойчивости (вычитают max перед экспонентой).
  - topic: nn_basics
    uid: dropout
    difficulty: 2
    question: "Как работает dropout и почему он регуляризует?"
    answer: |
      Во время обучения dropout случайно «выключает» долю нейронов (например, 50%)
      на каждом проходе. На инференсе все нейроны активны (с масштабированием).

      Почему помогает против overfitting:
        • Сеть не может полагаться на конкретные нейроны → учит избыточные,
          робастные признаки.
        • По сути это усреднение ансамбля множества «прореженных» подсетей.

      Где ставить: чаще в полносвязных слоях. В трансформерах применяется, но
      аккуратно; в свёрточных слоях реже (там работает BatchNorm).
  - topic: nn_basics
    uid: weight_init
    difficulty: 3
    question: "Почему важна инициализация весов (Xavier/He)?"
    answer: |
      Плохая инициализация ломает обучение: слишком большие веса → активации/
      градиенты взрываются, слишком малые → затухают. Нулевая инициализация вообще
      убивает обучение (все нейроны симметричны и учат одно и то же).

      Идея Xavier/He — выбрать дисперсию начальных весов так, чтобы дисперсия
      сигнала сохранялась от слоя к слою:
        • Xavier (Glorot) — для tanh/sigmoid,
        • He — для ReLU (учитывает, что половина выходов обнуляется).

      Это держит градиенты в разумном диапазоне на старте и ускоряет сходимость.
  - topic: nn_basics
    uid: epoch_batch
    difficulty: 1
    question: "В чём разница между epoch, batch и iteration?"
    answer: |
      • Batch — порция объектов, по которой считается один шаг градиента.
      • Iteration — один шаг обновления весов (один batch).
      • Epoch — один полный проход по всему датасету.

      Связь: iterations_per_epoch = размер_датасета / batch_size. Например, 10000
      объектов, batch 100 → 100 итераций на эпоху. Обычно учат несколько эпох,
      следя за validation-метрикой и применяя early stopping.
  - topic: nn_basics
    uid: loss_vs_metric
    difficulty: 2
    question: "Чем loss отличается от метрики качества?"
    answer: |
      • Loss — то, что МИНИМИЗИРУЕТ оптимизатор; должна быть дифференцируемой и
        гладкой (cross-entropy, MSE).
      • Метрика — то, что важно БИЗНЕСУ/нам для оценки (accuracy, F1, ROC-AUC);
        может быть недифференцируемой.

      Их разделяют, потому что напрямую оптимизировать метрику часто нельзя
      (accuracy — ступенчатая, градиент нулевой). Поэтому минимизируем
      «суррогатный» гладкий loss, коррелирующий с метрикой, а следим за метрикой
      на валидации.
  - topic: nn_basics
    uid: early_stopping
    difficulty: 2
    question: "Что такое early stopping и как он связан с регуляризацией?"
    answer: |
      Early stopping — остановка обучения, когда метрика на validation перестала
      улучшаться (и начала ухудшаться), даже если train-loss ещё падает. Берут
      веса с лучшей val-метрики.

      Это форма регуляризации: ограничивает «эффективную сложность» модели,
      не давая ей переобучиться на train. Просто, дёшево, почти всегда полезно.
      Обычно с «patience» — ждать N эпох без улучшения, прежде чем остановиться.

  # --- Normalization ---
  - topic: normalization
    uid: batchnorm
    difficulty: 3
    question: "Как работает Batch Normalization и зачем она нужна?"
    answer: |
      BatchNorm нормирует активации внутри слоя по статистике МИНИ-БАТЧА (вычитает
      среднее, делит на std), затем масштабирует и сдвигает обучаемыми
      параметрами gamma и beta.

      Зачем:
        • стабилизирует распределение активаций между слоями → быстрее и
          устойчивее обучение, можно больший learning rate;
        • лёгкий регуляризующий эффект (шум от батча).

      Нюансы: зависит от размера батча (плохо при batch=1), различается поведение
      train/inference (на инференсе — скользящие средние). Поэтому в трансформерах
      и RNN предпочитают LayerNorm.
  - topic: normalization
    uid: layernorm
    difficulty: 3
    question: "Чем LayerNorm отличается от BatchNorm и почему он в трансформерах?"
    answer: |
      Отличие — ПО ЧЕМУ считается статистика:
        • BatchNorm — по батчу (для каждого признака среднее/std по объектам
          батча). Зависит от размера батча.
        • LayerNorm — по признакам ОДНОГО объекта (среднее/std по его активациям).
          Не зависит от батча и от других примеров.

      Поэтому LayerNorm идеален для последовательностей переменной длины и малых/
      переменных батчей — то есть для трансформеров и RNN. Поведение одинаково на
      train и inference (нет скользящих статистик).
  - topic: normalization
    uid: rmsnorm
    difficulty: 3
    question: "Что такое RMSNorm и почему его используют в современных LLM?"
    answer: |
      RMSNorm — упрощённый LayerNorm: нормирует только на корень из среднего
      квадратов активаций (RMS), БЕЗ вычитания среднего и без сдвига beta:
        x / sqrt(mean(x²) + eps) * gamma.

      Зачем: дешевле (меньше операций), а на практике работает не хуже LayerNorm.
      Поэтому он в LLaMA и многих современных LLM — на масштабе экономия вычислений
      существенна. Это пример инженерного упрощения, которое масштабируется.
  - topic: normalization
    uid: norm_why_helps
    difficulty: 3
    question: "Почему нормализация вообще ускоряет и стабилизирует обучение?"
    answer: |
      Несколько эффектов:
        • Сглаживает «ландшафт» loss — градиенты ведут себя стабильнее, можно
          больший learning rate (исходный аргумент про «internal covariate shift»
          сейчас считают не главным).
        • Держит активации в разумном масштабе → меньше vanishing/exploding
          градиентов в глубоких сетях.
        • Делает обучение менее чувствительным к инициализации и масштабу входов.

      Итог: нормализация — почти обязательный компонент глубоких сетей; вопрос
      лишь какой тип (Batch для CNN, Layer/RMS для трансформеров).
  - topic: normalization
    uid: groupnorm
    difficulty: 2
    question: "Когда полезен GroupNorm?"
    answer: |
      GroupNorm делит каналы на группы и нормирует внутри группы для каждого
      объекта отдельно. Как и LayerNorm, НЕ зависит от размера батча.

      Полезен в компьютерном зрении при МАЛЫХ батчах (детекция, сегментация,
      обучение больших моделей, где batch=1-2 на GPU), где BatchNorm деградирует
      из-за шумной батч-статистики. Это компромисс между Batch- и LayerNorm.

  # --- Transformer ---
  - topic: transformer
    uid: self_attention
    difficulty: 3
    question: "Как работает self-attention? Объясни Q, K, V."
    answer: |
      Каждый токен превращается в три вектора: Query (что ищу), Key (что предлагаю),
      Value (что передам). Внимание:
        Attention(Q,K,V) = softmax(Q·Kᵀ / sqrt(d_k)) · V

      По шагам: скалярное произведение Q каждого токена со всеми K даёт «сходство»
      → softmax превращает в веса → взвешенная сумма V даёт новое представление
      токена, обогащённое контекстом. Деление на sqrt(d_k) стабилизирует softmax.

      Суть: каждый токен «смотрит» на все остальные и подмешивает релевантную
      информацию. Это позволяет улавливать дальние зависимости напрямую.
  - topic: transformer
    uid: multihead
    difficulty: 3
    question: "Зачем нужно multi-head attention?"
    answer: |
      Вместо одного внимания делают несколько «голов» параллельно, каждая со
      своими проекциями Q/K/V в подпространство меньшей размерности. Результаты
      конкатенируют и проецируют.

      Зачем: разные головы учатся смотреть на разные типы связей — одна на
      синтаксис, другая на кореференцию, третья на соседей и т.д. Это как
      несколько «взглядов» на контекст одновременно, повышает выразительность без
      роста стоимости (размерность голов меньше).
  - topic: transformer
    uid: positional_encoding
    difficulty: 3
    question: "Зачем трансформеру positional encoding?"
    answer: |
      Self-attention сам по себе ПЕРЕСТАНОВОЧНО-ИНВАРИАНТЕН: он видит набор
      токенов без понятия порядка («кошка ест мышь» = «мышь ест кошка»). А порядок
      в языке критичен.

      Positional encoding добавляет к эмбеддингам информацию о позиции:
        • синусоидальный (фиксированные sin/cos разных частот) — в оригинале;
        • обучаемые позиционные эмбеддинги;
        • RoPE (rotary) — поворот векторов на угол, зависящий от позиции; стандарт
          в современных LLM, хорошо обобщается на длинные контексты.
  - topic: transformer
    uid: transformer_vs_rnn
    difficulty: 3
    question: "Почему трансформеры вытеснили RNN?"
    answer: |
      • Параллелизм: RNN обрабатывает последовательность пошагово (зависимость от
        предыдущего шага) → нельзя распараллелить по времени. Трансформер считает
        все позиции сразу → отлично грузит GPU, обучается быстрее.
      • Дальние зависимости: в RNN сигнал затухает через много шагов; в
        трансформере любой токен напрямую «дотягивается» до любого (путь длины 1).
      • Масштабируемость: трансформеры хорошо растут с данными и параметрами
        (scaling laws) — основа LLM.

      Цена: attention — O(n²) по длине последовательности (память/время), отсюда
      работы над эффективным/линейным вниманием.
  - topic: transformer
    uid: bert_vs_gpt
    difficulty: 3
    question: "Чем отличаются BERT и GPT по архитектуре и задачам?"
    answer: |
      • BERT — encoder-only, двунаправленный: видит контекст слева И справа.
        Обучается на masked language modeling (предсказать замаскированные токены).
        Силён в ПОНИМАНИИ: классификация, NER, поиск (эмбеддинги).
      • GPT — decoder-only, авторегрессионный: предсказывает следующий токен,
        видит только левый контекст (causal mask). Силён в ГЕНЕРАЦИИ текста.

      Отсюда применение: BERT — энкодер для downstream-задач понимания;
      GPT — генеративные модели, основа современных LLM и чат-ботов.
  - topic: transformer
    uid: attention_complexity
    difficulty: 3
    question: "Почему attention имеет сложность O(n²) и как с этим борются?"
    answer: |
      Self-attention считает попарные взаимодействия всех токенов: матрица
      Q·Kᵀ имеет размер n×n (n — длина последовательности) → время и память растут
      квадратично. При длинных контекстах это узкое место.

      Борьба:
        • FlashAttention — точное внимание, но эффективное по памяти (не
          материализует всю матрицу, тайлинг в SRAM);
        • разреженное/локальное внимание (Longformer, BigBird);
        • линейные приближения (Performer);
        • State Space Models (Mamba) — альтернатива с линейной сложностью.

  # --- PyTorch ---
  - topic: pytorch
    uid: tensor
    difficulty: 1
    question: "Что такое тензор в PyTorch и чем отличается от numpy-массива?"
    answer: |
      Тензор — многомерный массив (как numpy ndarray), но с двумя ключевыми
      добавками:
        • может жить на GPU (.to('cuda')) → быстрые параллельные вычисления;
        • поддерживает autograd — автоматическое дифференцирование (если
          requires_grad=True, PyTorch строит граф операций для backprop).

      numpy и torch-тензоры легко конвертируются и даже могут делить память на CPU
      (torch.from_numpy). Тензор — базовый строительный блок всех данных и весов
      в PyTorch.
  - topic: pytorch
    uid: autograd
    difficulty: 3
    question: "Как работает autograd в PyTorch?"
    answer: |
      PyTorch строит динамический вычислительный граф «на лету»: каждая операция
      над тензором с requires_grad=True запоминается. Когда вызываешь loss.backward(),
      PyTorch проходит граф назад (chain rule) и заполняет .grad у всех листовых
      тензоров (параметров).

      Цикл: forward (строим граф) → loss.backward() (считаем градиенты) →
      optimizer.step() (обновляем веса) → optimizer.zero_grad() (обнуляем градиенты
      перед следующим шагом, иначе они аккумулируются!).

      Динамический граф (define-by-run) — почему PyTorch гибок для отладки и
      сложной логики (ветвления, циклы).
  - topic: pytorch
    uid: nn_module
    difficulty: 2
    question: "Что такое nn.Module и как описать модель в PyTorch?"
    answer: |
      nn.Module — базовый класс для слоёв и моделей. Наследуешься, в __init__
      объявляешь слои (они авто-регистрируют параметры), в forward(self, x)
      описываешь, как данные текут через сеть.

      Пример сути:
        class Net(nn.Module):
            def __init__(self): super().__init__(); self.fc = nn.Linear(10, 1)
            def forward(self, x): return self.fc(x)

      Module даёт .parameters() (для оптимизатора), .to(device), .train()/.eval()
      (переключение режимов dropout/BatchNorm), сохранение через state_dict.
  - topic: pytorch
    uid: training_loop
    difficulty: 2
    question: "Опиши стандартный training loop в PyTorch."
    answer: |
      На каждом батче:
        1. optimizer.zero_grad()      # обнулить старые градиенты
        2. pred = model(x)            # forward
        3. loss = criterion(pred, y)  # посчитать loss
        4. loss.backward()            # backward: градиенты в .grad
        5. optimizer.step()           # шаг оптимизатора, обновить веса

      Частая ошибка — забыть zero_grad(): градиенты в PyTorch аккумулируются, и
      без обнуления шаги «складываются». Также: model.train() во время обучения и
      model.eval() + torch.no_grad() во время валидации/инференса.
  - topic: pytorch
    uid: dataloader
    difficulty: 2
    question: "Зачем нужны Dataset и DataLoader в PyTorch?"
    answer: |
      • Dataset — абстракция доступа к данным: реализуешь __len__ и __getitem__
        (вернуть один объект+таргет). Можно класть туда чтение с диска,
        аугментации.
      • DataLoader — оборачивает Dataset и даёт итератор по батчам с: shuffle
        (перемешать каждую эпоху), batch_size, num_workers (параллельная загрузка
        в несколько процессов), pin_memory (быстрее на GPU).

      Это отделяет логику данных от обучения и убирает узкое место загрузки —
      пока GPU считает, воркеры готовят следующий батч.
  - topic: pytorch
    uid: no_grad_eval
    difficulty: 2
    question: "В чём разница между model.eval() и torch.no_grad()?"
    answer: |
      Это РАЗНЫЕ вещи, нужны вместе на инференсе:
        • model.eval() — переключает режим слоёв: dropout выключается, BatchNorm
          использует накопленные средние, а не статистику батча. Влияет на
          ПОВЕДЕНИЕ модели.
        • torch.no_grad() — контекст, отключающий построение графа autograd →
          экономит память и ускоряет, т.к. градиенты не нужны на инференсе.

      Забыл eval() → dropout/BN портят предсказания. Забыл no_grad() → лишняя
      память и медленнее. На валидации используют оба.
  - topic: pytorch
    uid: gpu_usage
    difficulty: 2
    question: "Как в PyTorch задействовать GPU и какая частая ошибка?"
    answer: |
      Создаёшь device = torch.device('cuda' if torch.cuda.is_available() else 'cpu')
      и переносишь МОДЕЛЬ и ДАННЫЕ: model.to(device), x = x.to(device).

      Частая ошибка: «Expected all tensors to be on the same device» — когда часть
      тензоров на CPU, часть на GPU. Все участники одной операции должны быть на
      одном устройстве.

      Также: для метрик/логов снимай тензор с графа и GPU через .detach().cpu()
      (или .item() для скаляра), иначе утечёт память.

  # --- CNN ---
  - topic: cnn
    uid: convolution
    difficulty: 2
    question: "Что такое свёртка (convolution) и почему она хороша для изображений?"
    answer: |
      Свёртка прогоняет небольшой обучаемый фильтр (ядро) по изображению, считая в
      каждой позиции взвешенную сумму локального участка → карта признаков.

      Почему хорошо для картинок:
        • Локальность: пиксели рядом связаны — фильтр ловит локальные паттерны
          (края, текстуры).
        • Разделяемые веса (weight sharing): один фильтр скользит по всему
          изображению → радикально меньше параметров, чем у полносвязного слоя.
        • Трансляционная инвариантность: паттерн распознаётся независимо от
          положения.
  - topic: cnn
    uid: pooling
    difficulty: 2
    question: "Зачем нужен pooling в свёрточных сетях?"
    answer: |
      Pooling (обычно max или average) уменьшает пространственный размер карты
      признаков, агрегируя по небольшим окнам.

      Зачем:
        • снижает число параметров и вычислений в следующих слоях;
        • даёт устойчивость к небольшим сдвигам (локальная инвариантность);
        • расширяет «поле зрения» (receptive field) более глубоких слоёв.

      В современных архитектурах часть pooling заменяют свёртками со страйдом, но
      идея сжатия пространственной информации сохраняется.
  - topic: cnn
    uid: resnet
    difficulty: 3
    question: "В чём идея ResNet и residual connections?"
    answer: |
      Очень глубокие сети раньше деградировали (труднее обучать из-за затухающих
      градиентов). ResNet добавил skip-связи: блок учит не сам выход, а ОСТАТОК:
      out = F(x) + x.

      Почему помогает:
        • градиент течёт «в обход» через тождественную связь → не затухает,
          можно учить сети из сотен слоёв;
        • если слой не нужен, ему легко выучить F(x)=0 (тождество).

      Residual-связи стали стандартом — они есть и в трансформерах вокруг
      каждого подслоя.
  - topic: cnn
    uid: transfer_learning
    difficulty: 2
    question: "Что такое transfer learning и fine-tuning?"
    answer: |
      Transfer learning — переиспользование модели, обученной на большой задаче
      (например, ImageNet), для своей задачи с малыми данными. Ранние слои уже
      выучили универсальные признаки (края, текстуры).

      Варианты:
        • Feature extraction — заморозить предобученные слои, обучить только новую
          «голову» под свои классы.
        • Fine-tuning — разморозить часть/все слои и дообучить с малым learning
          rate под свои данные.

      Экономит данные и время, почти всегда бьёт обучение с нуля на малых
      датасетах. В NLP тот же принцип — дообучение предобученных трансформеров.

  # --- RNN ---
  - topic: rnn
    uid: rnn_basics
    difficulty: 2
    question: "Как работает RNN и в чём его главная проблема?"
    answer: |
      RNN обрабатывает последовательность пошагово, поддерживая скрытое состояние
      (hidden state) — «память», которая обновляется на каждом шаге и передаётся
      дальше: h_t = f(h_{t-1}, x_t). Так информация о прошлом влияет на текущий шаг.

      Главная проблема — затухающий/взрывающийся градиент при обучении через много
      шагов (BPTT): сигнал от далёких токенов теряется → плохо ловит длинные
      зависимости. Плюс нельзя распараллелить по времени. Отсюда LSTM/GRU, а затем
      трансформеры.
  - topic: rnn
    uid: lstm_gru
    difficulty: 3
    question: "Как LSTM/GRU решают проблему долгой памяти?"
    answer: |
      Они добавляют ГЕЙТЫ (вентили) — обучаемые «краны», регулирующие поток
      информации:
        • LSTM: ячейка памяти (cell state) + forget/input/output гейты. Forget-гейт
          решает, что забыть, input — что записать, output — что отдать. Cell state
          течёт почти линейно → градиент не затухает.
        • GRU: упрощённый вариант с update/reset гейтами, без отдельной ячейки.
          Меньше параметров, часто сопоставим по качеству.

      Гейты позволяют сохранять важную информацию на много шагов. Но параллелизма
      по времени всё равно нет — поэтому уступили трансформерам.
  - topic: rnn
    uid: seq2seq
    difficulty: 2
    question: "Что такое seq2seq и зачем там attention?"
    answer: |
      Seq2seq — архитектура «последовательность → последовательность» (перевод,
      суммаризация): encoder читает вход и сжимает в вектор-контекст, decoder
      генерирует выход.

      Проблема раннего seq2seq на RNN: весь вход сжимается в ОДИН вектор — узкое
      горлышко, длинные последовательности теряются. Attention решил это: декодер
      на каждом шаге «смотрит» на все скрытые состояния энкодера и выбирает
      релевантные. Эта идея внимания и выросла в трансформер («Attention is all
      you need»).

  # --- Генеративные модели ---
  - topic: generative
    uid: discriminative_vs_generative
    difficulty: 3
    question: "Чем генеративные модели отличаются от дискриминативных?"
    answer: |
      • Дискриминативные моделируют P(y|x) — границу между классами (логрег, SVM,
        большинство классификаторов). Отвечают «какой класс».
      • Генеративные моделируют распределение данных P(x) или P(x|y) — умеют
        ПОРОЖДАТЬ новые объекты (GAN, VAE, diffusion, языковые модели).

      Генеративные могут и классифицировать (через Байеса), и сэмплировать новое
      (картинки, текст). Современный AI (LLM, image generation) — во многом про
      генеративные модели.
  - topic: generative
    uid: gan
    difficulty: 3
    question: "Как устроен GAN и почему его сложно обучать?"
    answer: |
      GAN — две сети в игре: генератор G создаёт фейки из шума, дискриминатор D
      учится отличать фейки от настоящих. G учится обманывать D. Это минимаксная
      игра; в идеале G порождает данные, неотличимые от реальных.

      Сложности обучения:
        • нестабильность (две сети должны развиваться согласованно);
        • mode collapse — G выдаёт мало разнообразных образцов;
        • тонкий баланс — если D слишком силён, у G нет полезного градиента.

      Отсюда множество трюков (WGAN, спектральная нормализация). Сейчас в генерации
      изображений во многом уступили diffusion.
  - topic: generative
    uid: vae
    difficulty: 3
    question: "Как работает VAE и чем отличается от обычного автоэнкодера?"
    answer: |
      Автоэнкодер сжимает вход в латентный код и реконструирует обратно. VAE
      делает латентное пространство ВЕРОЯТНОСТНЫМ: энкодер выдаёт не точку, а
      распределение (mean, variance), из которого сэмплируют код.

      Loss = reconstruction + KL(q(z|x) || prior) — это ELBO. KL-член держит
      латентное пространство близким к нормальному, делая его гладким и
      непрерывным → можно сэмплировать новые объекты и интерполировать.

      Трюк репараметризации (z = mean + std·ε) позволяет протолкнуть градиент
      через сэмплирование. VAE даёт более «размытые», но стабильные результаты.
  - topic: generative
    uid: diffusion
    difficulty: 3
    question: "Какова основная идея diffusion models?"
    answer: |
      Diffusion работает в два процесса:
        • Forward — постепенно добавляем гауссов шум к данным за много шагов, пока
          не получится чистый шум.
        • Reverse — обучаем нейросеть пошагово УБИРАТЬ шум (предсказывать шум на
          каждом шаге). Сгенерировать = начать с шума и итеративно его «расшумлять».

      Почему хороши: стабильное обучение (в отличие от GAN), высокое качество и
      разнообразие. Основа Stable Diffusion, DALL-E, Midjourney. Минус — генерация
      медленная (много шагов), отсюда работы по ускорению (DDIM, distillation).

  # --- NLP ---
  - topic: nlp
    uid: word_embeddings
    difficulty: 2
    question: "Что такое word embeddings и в чём идея Word2Vec?"
    answer: |
      Word embedding — представление слова плотным вектором, где близкие по
      смыслу слова близки в пространстве. В отличие от one-hot (разреженный, без
      смысла), эмбеддинг улавливает семантику.

      Word2Vec учит эмбеддинги по принципу «слово определяется его окружением»
      (distributional hypothesis): предсказывает слово по контексту (CBOW) или
      контекст по слову (skip-gram). Знаменитый эффект: vec(king) − vec(man) +
      vec(woman) ≈ vec(queen) — семантика становится арифметикой.

      Минус: один вектор на слово вне контекста (не различает омонимы) — это решают
      контекстные эмбеддинги (BERT).
  - topic: nlp
    uid: tokenization
    difficulty: 2
    question: "Зачем нужна субсловная токенизация (BPE) в современных моделях?"
    answer: |
      Токенизация режет текст на единицы для модели. Крайности плохи: по словам —
      огромный словарь и проблема незнакомых слов (OOV); по символам — слишком
      длинные последовательности.

      BPE (Byte Pair Encoding) — компромисс: часто встречающиеся пары символов
      итеративно сливаются в субслова. Частые слова — один токен, редкие/новые
      собираются из кусочков. Так фиксированный словарь покрывает ЛЮБОЙ текст без
      OOV и разумной длины. Стандарт для LLM (GPT, BERT-варианты).
  - topic: nlp
    uid: contextual_embeddings
    difficulty: 2
    question: "Чем контекстные эмбеддинги (BERT) лучше Word2Vec?"
    answer: |
      Word2Vec даёт ОДИН вектор на слово независимо от контекста: «bank» (берег) и
      «bank» (банк) — один эмбеддинг.

      Контекстные модели (BERT, GPT) выдают эмбеддинг слова С УЧЁТОМ всего
      предложения — для каждого вхождения свой вектор, отражающий смысл в данном
      контексте. Это резко улучшило понимание языка (омонимы, синтаксис) и стало
      базой для downstream-задач (классификация, NER, поиск, RAG-эмбеддинги).

  # --- Computer Vision ---
  - topic: cv
    uid: detection_segmentation
    difficulty: 2
    question: "Чем отличаются классификация, детекция и сегментация в CV?"
    answer: |
      Три уровня задач по картинке:
        • Классификация — «что на изображении» (один ярлык на всю картинку).
        • Детекция (object detection) — «что и ГДЕ»: bounding box + класс для
          каждого объекта (YOLO, Faster R-CNN).
        • Сегментация — пиксельная маска: semantic (класс каждого пикселя) или
          instance (ещё и различает отдельные объекты одного класса).

      Сложность и детальность растут от классификации к сегментации;
      соответственно растут требования к разметке.
  - topic: cv
    uid: clip_vit
    difficulty: 3
    question: "Что такое ViT и CLIP?"
    answer: |
      • ViT (Vision Transformer) — применяет трансформер к картинкам: изображение
        режется на патчи, каждый патч — «токен», дальше обычный трансформер.
        Показал, что на больших данных attention бьёт свёртки.
      • CLIP — обучен на парах (картинка, текст) контрастивно: сближает эмбеддинги
        соответствующих картинки и подписи, разводит несоответствующие. В итоге
        картинки и текст живут в ОДНОМ пространстве.

      CLIP даёт zero-shot классификацию (сравни эмбеддинг картинки с эмбеддингами
      текстовых описаний классов) и лежит в основе мультимодальных систем и
      text-to-image генерации.

  # ===================== ДОПОЛНЕНИЯ (топовые собесные) =====================

  - topic: programming
    uid: generators_memory
    difficulty: 2
    question: "Чем генератор отличается от списка и когда он полезен в работе с данными?"
    answer: |
      Список держит все элементы в памяти сразу; генератор вычисляет элементы
      ЛЕНИВО, по одному, не храня всё.

      Польза: обработка датасета, не влезающего в RAM (стриминг строк файла,
      батчей). `for line in open(file)` или yield-функция читают по кусочку.
      Минусы генератора: одноразовый проход (нельзя переиспользовать), нет len()/
      индексации. В ML так грузят большие данные и строят пайплайны
      предобработки.
  - topic: programming
    uid: train_test_split
    difficulty: 1
    question: "Зачем делить данные на train/validation/test, а не на train/test?"
    answer: |
      • Train — обучаем модель.
      • Validation — подбираем гиперпараметры и выбираем модель.
      • Test — финальная ЧЕСТНАЯ оценка, трогаем один раз в самом конце.

      Если подбирать гиперпараметры по test, мы косвенно «подгоняемся» под него →
      оценка станет оптимистичной (leak). Поэтому test держат «под замком».
      Альтернатива при малых данных — cross-validation вместо отдельного
      validation, но отложенный test всё равно полезен.
  - topic: probability
    uid: entropy_kl
    difficulty: 3
    question: "Что такое энтропия, cross-entropy и KL-дивергенция?"
    answer: |
      • Энтропия H(p) = −sum p·log p — мера неопределённости распределения
        (сколько бит нужно в среднем, чтобы закодировать исход).
      • Cross-entropy H(p,q) = −sum p·log q — «стоимость» кодирования истинного p
        кодом, рассчитанным на q. Это и есть loss классификации (p — истинные
        метки, q — предсказания).
      • KL(p||q) = H(p,q) − H(p) ≥ 0 — насколько q отличается от p. Несимметрична,
        не метрика.

      Минимизация cross-entropy = приближение предсказаний q к истине p. KL —
      основа variational inference и многих регуляризаторов.
  - topic: statistics
    uid: sample_size
    difficulty: 3
    question: "От чего зависит нужный размер выборки в A/B-тесте?"
    answer: |
      Размер выборки растёт, когда:
        • меньше минимально детектируемый эффект (MDE) — мелкие различия требуют
          больше данных (зависимость ~ 1/MDE²);
        • выше требуемая мощность (power, обычно 80%) и ниже α;
        • больше дисперсия метрики.

      Идея: заранее посчитать n (power analysis), зафиксировать и не подглядывать.
      Иначе остановка «по достижению значимости» раздувает false positive. Для
      долей есть готовые формулы, для средних — через дисперсию и эффект.
  - topic: statistics
    uid: multiple_testing
    difficulty: 3
    question: "В чём проблема множественных сравнений и как её решают?"
    answer: |
      Если проверять много гипотез с α=0.05, вероятность хотя бы одной ложной
      «находки» быстро растёт (при 20 тестах ≈ 64%). Так появляются «значимые»
      результаты на чистом шуме (p-hacking).

      Поправки:
        • Bonferroni — делим α на число тестов (строго, консервативно).
        • Benjamini-Hochberg (FDR) — контролирует долю ложных открытий, мягче и
          мощнее.

      Актуально в A/B с многими метриками/сегментами и при отборе признаков.
  - topic: statistics
    uid: simpsons_paradox
    difficulty: 3
    question: "Что такое парадокс Симпсона?"
    answer: |
      Парадокс Симпсона — когда тренд, видимый в подгруппах, ИСЧЕЗАЕТ или
      РАЗВОРАЧИВАЕТСЯ при объединении данных. Причина — скрытый конфаундер и
      неравные размеры групп.

      Классика: лекарство помогает и мужчинам, и женщинам по отдельности, но «в
      целом» кажется вредным, потому что группы непропорциональны.

      Урок: агрегаты обманчивы; всегда смотри на разрезы (slices) и думай о
      конфаундерах. Прямая связь с важностью корректной сегментации в A/B.
  - topic: optimization
    uid: momentum
    difficulty: 2
    question: "Что такое momentum в оптимизации и зачем он?"
    answer: |
      Momentum накапливает «скорость» — экспоненциальное среднее прошлых
      градиентов — и шагает по ней:
        v := β·v + ∇L;  w := w − lr·v

      Эффект: как тяжёлый шарик, катящийся по поверхности — гасит шум и осцилляции
      поперёк «оврага», ускоряется вдоль устойчивого спуска. Быстрее сходимость и
      меньше застреваний в мелких неровностях. Эта идея — часть Adam (его первый
      момент).
  - topic: optimization
    uid: weight_decay
    difficulty: 3
    question: "Что такое weight decay и как он связан с L2-регуляризацией?"
    answer: |
      Weight decay на каждом шаге слегка «усыхает» веса к нулю: w := w − lr·(∇L + λ·w).
      Для обычного SGD это математически эквивалентно добавлению L2-штрафа λ·|w|²
      к loss.

      Но для адаптивных оптимизаторов (Adam) «L2 внутри градиента» и «честный decay»
      РАЗЛИЧАЮТСЯ из-за деления на масштаб градиента. Поэтому придумали AdamW,
      где decay применяется отдельно — это улучшает обобщение и стало стандартом
      для трансформеров.
  - topic: supervised
    uid: normal_equation
    difficulty: 3
    question: "Когда линейную регрессию решать через нормальное уравнение, а когда через GD?"
    answer: |
      Нормальное уравнение даёт точное решение в один шаг: w = (XᵀX)⁻¹Xᵀy.
        • Плюс: без итераций и подбора learning rate.
        • Минус: обращение матрицы ~ O(d³) по числу признаков; плохо при больших d
          и при мультиколлинеарности (XᵀX вырождена).

      Gradient descent:
        • масштабируется на огромные n и d, работает онлайн/батчами;
        • нужен подбор lr и итерации.

      Правило: мало признаков → можно нормальное уравнение; много данных/признаков
      или нужен онлайн → GD.
  - topic: supervised
    uid: multicollinearity
    difficulty: 3
    question: "Что такое мультиколлинеарность и чем она вредна?"
    answer: |
      Мультиколлинеарность — сильная линейная зависимость между признаками
      (например, «рост в см» и «рост в м»). Матрица XᵀX становится почти
      вырожденной.

      Последствия (для линейных моделей):
        • коэффициенты нестабильны, с огромной дисперсией, могут менять знак от
          малого изменения данных → теряется интерпретируемость;
        • предсказания при этом могут оставаться норм.

      Диагностика: VIF, корреляционная матрица. Лечение: убрать/объединить
      признаки, L2-регуляризация (Ridge стабилизирует), PCA. Деревьям почти
      безразлично.
  - topic: supervised
    uid: calibration
    difficulty: 3
    question: "Что такое калибровка вероятностей и зачем она нужна?"
    answer: |
      Модель калибрована, если среди объектов с предсказанной вероятностью 0.8
      реально положительных примерно 80%. Многие модели дают хороший РАНГ, но
      плохие вероятности (бустинги — переуверенные, SVM вообще без вероятностей).

      Зачем: когда нужно само значение вероятности — для принятия решений по
      порогу, ожидаемой прибыли, риск-моделей.

      Методы: Platt scaling (логистическая поверх скоров), isotonic regression.
      Проверка — reliability diagram и калибровочные метрики. На отдельной
      калибровочной выборке, чтобы не было leakage.
  - topic: supervised
    uid: decision_boundary
    difficulty: 2
    question: "Чем граница решений линейных моделей отличается от деревьев?"
    answer: |
      • Линейные модели (логрег, SVM без ядра) рисуют ПРЯМУЮ/гиперплоскость —
        одна линейная граница. Хороши, когда классы линейно разделимы; плохо
        ловят сложные формы без feature engineering/ядер.
      • Деревья режут пространство ОСЕ-ПАРАЛЛЕЛЬНЫМИ порогами → ступенчатая,
        кусочно-постоянная граница произвольной сложности, ловит взаимодействия
        признаков, но «лесенкой» и легко переобучается.

      Отсюда выбор: простая линейная зависимость → линейная модель; сложные
      нелинейные взаимодействия в табличке → деревья/бустинги.
  - topic: ml_theory
    uid: stratified_cv
    difficulty: 2
    question: "Что такое stratified k-fold и когда он нужен?"
    answer: |
      Stratified k-fold сохраняет долю классов в каждом фолде такой же, как во
      всём датасете. Нужен при дисбалансе/малых классах: при обычном случайном
      делении редкий класс может почти не попасть в какой-то фолд → нестабильная
      оценка.

      Для регрессии аналог — стратификация по бинам таргета. Это дефолт для
      классификации в sklearn (StratifiedKFold). Цель — чтобы каждый фолд был
      репрезентативным.
  - topic: ml_theory
    uid: timeseries_cv
    difficulty: 3
    question: "Почему для временных рядов нельзя обычный k-fold?"
    answer: |
      Обычный k-fold перемешивает данные → модель обучается на «будущем» и
      проверяется на «прошлом». Это leakage: в проде будущего нет, оценка
      завышена.

      Правильно — разбиение с уважением времени: TimeSeriesSplit (расширяющееся
      или скользящее окно), где train всегда РАНЬШЕ validation. Так оцениваем
      именно прогноз вперёд. Те же грабли — при любых данных с временной
      зависимостью (нельзя случайно мешать события одного пользователя во времени).
  - topic: ml_theory
    uid: missing_values
    difficulty: 2
    question: "Как обрабатывать пропуски (missing values)?"
    answer: |
      Сначала понять ПРИРОДУ пропуска: случаен (MCAR/MAR) или сам факт пропуска
      информативен (MNAR).

      Подходы:
        • Удаление строк/столбцов (если пропусков мало).
        • Импутация: среднее/медиана/мода, или модельная (KNN, итеративная).
        • Флаг «было пропущено» как отдельный признак — если пропуск информативен.
        • Некоторые модели (XGBoost, CatBoost, LightGBM) обрабатывают NaN сами.

      Важно: статистики импутации считать на train и применять к test (иначе
      leakage). Импутацию — внутри пайплайна/CV.
  - topic: ml_theory
    uid: feature_selection
    difficulty: 2
    question: "Какие есть подходы к отбору признаков (feature selection)?"
    answer: |
      Три семейства:
        • Filter — по статистике, независимо от модели (корреляция с таргетом,
          mutual information, chi²). Быстро, но игнорирует взаимодействия.
        • Wrapper — перебор подмножеств с обучением модели (forward/backward
          selection, RFE). Точнее, но дорого.
        • Embedded — отбор встроен в обучение: L1-регуляризация зануляет веса,
          importance у деревьев.

      Зачем: меньше overfitting, быстрее инференс, интерпретируемость. Отбор —
      часть пайплайна (внутри CV), иначе leakage.
  - topic: metrics
    uid: log_loss_metric
    difficulty: 2
    question: "Что такое log loss как метрика и чем отличается от accuracy?"
    answer: |
      Log loss = −mean[y·log(p) + (1−y)·log(1−p)] оценивает КАЧЕСТВО ВЕРОЯТНОСТЕЙ,
      а не только класс. Сильно штрафует уверенные ошибки: предсказал 0.99, а там
      0 — огромный штраф.

      Отличие от accuracy: accuracy смотрит только на финальный класс по порогу и
      игнорирует уверенность. Log loss поощряет калиброванные вероятности. Поэтому
      когда важна не метка, а вероятность (риск, ранжирование) — log loss
      информативнее.
  - topic: metrics
    uid: pr_vs_roc
    difficulty: 3
    question: "Когда PR-кривая информативнее ROC-кривой?"
    answer: |
      При сильном дисбалансе классов. ROC использует FPR = FP/(FP+TN); при
      огромном числе негативов (TN) FPR остаётся низким даже при многих FP, и
      ROC-AUC выглядит оптимистично.

      PR-кривая (precision vs recall) не использует TN — она прямо показывает,
      сколько среди «положительных» предсказаний реально положительных. Поэтому
      для редкого важного класса (фрод, болезни, поиск) PR-AUC честнее отражает
      пользу модели.
  - topic: metrics
    uid: threshold_tuning
    difficulty: 2
    question: "Зачем двигать порог классификации (threshold) и как его выбрать?"
    answer: |
      Модель выдаёт вероятность; порог 0.5 — лишь дефолт. Сдвигая порог, мы меняем
      баланс precision/recall под задачу: ниже порог → больше recall (ловим
      больше, но и ложных тревог); выше → больше precision.

      Как выбрать: по бизнес-цели (цена FP vs FN), по точке на PR/ROC-кривой, по
      максимуму F1 или по нужному уровню recall. Порог подбирают на валидации, а
      не на test. Это бесплатный способ улучшить полезность без переобучения.
  - topic: unsupervised
    uid: anomaly_detection
    difficulty: 2
    question: "Как обнаруживают аномалии (anomaly detection)?"
    answer: |
      Аномалии — редкие объекты, не похожие на основную массу (фрод, поломки).
      Разметки обычно мало → задачи часто unsupervised.

      Подходы:
        • статистические (z-score, IQR) — отклонение от распределения;
        • по плотности/расстоянию (LOF, DBSCAN-шум, k-NN);
        • Isolation Forest — аномалии «отрезаются» деревом за меньше сплитов;
        • One-Class SVM, автоэнкодеры — большая ошибка реконструкции = аномалия.

      Метрики оценивают как редкий класс (precision/recall/PR-AUC). Главная
      трудность — сильный дисбаланс и дрейф «нормы».
  - topic: nn_basics
    uid: gradient_clipping
    difficulty: 2
    question: "Что такое gradient clipping и когда он нужен?"
    answer: |
      Gradient clipping ограничивает норму градиента сверху: если она превышает
      порог, градиент масштабируется вниз. Это спасает от exploding gradients —
      резких скачков весов и NaN.

      Особенно важен в RNN/LSTM (градиент через много шагов во времени) и при
      обучении трансформеров/LLM. Дешёвый и почти безвредный приём стабилизации.
      Дополняет нормализацию и аккуратный learning rate.
  - topic: nn_basics
    uid: batch_size_effect
    difficulty: 3
    question: "Как размер батча влияет на обучение?"
    answer: |
      • Маленький батч: шумный градиент (регуляризующий эффект, лучше обобщение),
        но дольше и нестабильнее; шум помогает выходить из плохих минимумов.
      • Большой батч: точнее градиент, эффективнее на GPU, быстрее по эпохам, НО
        склонен сходиться в «острые» минимумы и обобщать чуть хуже; требует
        повышать learning rate (и warmup).

      Эмпирика: lr масштабируют примерно пропорционально размеру батча. Батч —
      компромисс между скоростью, памятью GPU и качеством обобщения.
  - topic: transformer
    uid: transformer_block
    difficulty: 3
    question: "Из чего состоит блок трансформера?"
    answer: |
      Каждый блок — два подслоя, вокруг каждого residual-связь и нормализация:
        1. Multi-Head Self-Attention — смешивает информацию между токенами.
        2. Feed-Forward Network (FFN) — два линейных слоя с нелинейностью,
           обрабатывает каждый токен независимо (расширяет размерность и сжимает).

      Формула подслоя: x = Norm(x + Sublayer(x)). Residual спасает градиент, Norm
      (обычно LayerNorm; в LLM часто pre-norm) стабилизирует. Стопка таких блоков
      и есть трансформер. В decoder attention — causal (маскированный).
  - topic: transformer
    uid: kv_cache
    difficulty: 3
    question: "Что такое KV-cache и зачем он нужен при инференсе LLM?"
    answer: |
      При авторегрессионной генерации модель выдаёт токены по одному, каждый раз
      заново «смотря» на все предыдущие. Без оптимизации Key/Value для прошлых
      токенов пересчитывались бы на каждом шаге — квадратично дорого.

      KV-cache сохраняет уже вычисленные K и V прошлых токенов, и для нового токена
      считаются только его K/V. Это превращает генерацию из O(n²) в линейную по
      шагу, резко ускоряя инференс. Цена — память на кэш (растёт с длиной
      контекста), отсюда оптимизации вроде Multi-Query/Grouped-Query Attention.
      Полезно знать для работы с LLM-агентами.
  - topic: transformer
    uid: causal_mask
    difficulty: 2
    question: "Что такое causal mask в decoder-трансформере?"
    answer: |
      Causal (look-ahead) mask запрещает токену «подглядывать» в будущее: при
      авторегрессионной генерации позиция i может смотреть только на позиции ≤ i.
      Технически в матрице внимания будущие позиции зануляют (−∞ перед softmax).

      Зачем: модель учится предсказывать следующий токен, не видя ответа. Без маски
      была бы утечка будущего, и генерация сломалась бы. Это ключевое отличие
      decoder (GPT) от encoder (BERT, двунаправленный, без маски).
  - topic: pytorch
    uid: save_load
    difficulty: 1
    question: "Как правильно сохранять и загружать модель в PyTorch?"
    answer: |
      Рекомендуется сохранять state_dict (словарь весов), а не весь объект модели:
        torch.save(model.state_dict(), "model.pt")
      Загрузка: создать ту же архитектуру и залить веса:
        model.load_state_dict(torch.load("model.pt")); model.eval()

      Почему не весь объект (pickle модели): хрупко к изменениям кода/путей. Для
      продолжения обучения сохраняют также optimizer.state_dict(), эпоху, scheduler
      — это «checkpoint». Не забыть model.eval() перед инференсом.
  - topic: nlp
    uid: perplexity
    difficulty: 3
    question: "Что такое perplexity и как её понимать?"
    answer: |
      Perplexity — метрика языковых моделей: exp(средний log loss на токенах).
      Интуитивно — «во скольких вариантах в среднем колеблется модель» на каждом
      шаге. Чем НИЖЕ, тем модель увереннее и лучше предсказывает текст.

      perplexity = 1 — идеально; равна размеру словаря — модель угадывает наугад.
      Это intrinsic-метрика (оценка самого языкового моделирования), но низкая
      perplexity не гарантирует качество на конкретной downstream-задаче —
      финально всё равно меряют по задаче.
