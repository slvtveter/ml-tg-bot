questions:
  # --- bias-variance ---
  - topic: bias_variance
    uid: bv_tradeoff
    difficulty: 2
    question: "Что такое bias-variance tradeoff? Из чего складывается ошибка модели?"
    answer: |
      Ожидаемую ошибку модели на новых данных можно разложить на три части:
        Error = Bias² + Variance + Irreducible error

      • Bias (смещение) — ошибка из-за слишком простых предположений модели.
        Высокий bias → underfitting: модель не улавливает зависимость
        (пример: линейная регрессия на явно нелинейных данных).
      • Variance (разброс) — чувствительность к конкретной обучающей выборке.
        Высокая variance → overfitting: модель ловит шум, на новых данных плохо
        (пример: глубокое дерево без ограничений).
      • Irreducible error — шум в данных, его не убрать никакой моделью.

      Tradeoff: усложняя модель, мы снижаем bias, но растим variance, и наоборот.
      Цель — минимум суммы, а не любой из частей по отдельности.
  - topic: bias_variance
    uid: bv_diagnose
    difficulty: 3
    question: "Как по learning curves понять, у модели проблема с bias или с variance?"
    answer: |
      Смотрим на train error и validation error при росте объёма данных:

      • Высокий bias (underfitting): обе ошибки высокие и близки друг к другу,
        кривые рано выходят на плато. Больше данных НЕ поможет — нужна более
        сложная модель / новые features.
      • Высокая variance (overfitting): train error низкий, validation заметно
        выше, между ними большой gap. Помогает: больше данных, регуляризация,
        упрощение модели.

  # --- overfitting / регуляризация ---
  - topic: overfitting
    uid: l1_l2
    difficulty: 3
    question: "Чем отличаются L1 (Lasso) и L2 (Ridge) регуляризация? Когда какую брать?"
    answer: |
      Обе добавляют штраф за большие веса в loss, но штраф разный:
        • L2 (Ridge): + lambda * sum(w_i²) — штрафует квадрат весов.
        • L1 (Lasso): + lambda * sum(|w_i|) — штрафует модуль весов.

      Ключевая разница:
        • L2 равномерно "сжимает" веса к нулю, но не обнуляет их полностью.
        • L1 умеет зануливать веса ровно в 0 → автоматический feature selection
          (разреженная модель). Геометрически: ромбовидная область ограничения
          у L1 имеет "углы" на осях, и оптимум часто попадает в них.

      Когда что:
        • Много признаков, подозреваешь что часть бесполезна → L1.
        • Признаки коррелируют, хочешь устойчивости → L2.
        • Хочешь и то и то → Elastic Net (комбинация L1+L2).
  - topic: overfitting
    uid: overfit_signs
    difficulty: 2
    question: "Как обнаружить overfitting и какие есть способы с ним бороться?"
    answer: |
      Признак: большой разрыв между метрикой на train (хорошо) и на
      validation/test (заметно хуже).

      Способы борьбы:
        • Больше данных / data augmentation.
        • Регуляризация (L1/L2, dropout в нейросетях).
        • Упростить модель (меньше глубина дерева, меньше признаков).
        • Early stopping (остановить обучение, когда val-метрика перестала расти).
        • Cross-validation для честной оценки.
        • Feature selection / снижение размерности.

  # --- валидация ---
  - topic: validation
    uid: kfold
    difficulty: 2
    question: "Что такое k-fold cross-validation и зачем он нужен?"
    answer: |
      Делим данные на k частей (folds). Обучаем k раз: каждый раз одна часть —
      validation, остальные k-1 — train. Итоговая метрика — среднее по k прогонам.

      Зачем:
        • Оценка качества устойчивее, чем по одному train/test split (меньше
          зависит от удачного/неудачного деления).
        • Каждый объект ровно один раз побывал в validation.
        • Видно разброс метрики между folds (стабильна ли модель).

      Типичный k = 5 или 10. Минус — обучаем модель k раз (дороже).
  - topic: validation
    uid: leakage
    difficulty: 3
    question: "Что такое data leakage и как его не допустить при cross-validation?"
    answer: |
      Data leakage — когда в обучение просачивается информация, недоступная в
      реальном применении (или из validation/test). Модель показывает завышенное
      качество, а в проде проваливается.

      Частые источники:
        • Препроцессинг (scaling, encoding, заполнение пропусков, отбор фич) на
          ВСЕХ данных до разбиения → статистики test "подсмотрены".
        • Признаки, которых не будет на момент предсказания (target leakage).

      Как избежать: любой fit препроцессинга — только на train-части каждого
      fold. В sklearn для этого Pipeline + cross_val_score: внутри CV препроцессинг
      переобучается на каждом fold отдельно.

  # --- linear regression ---
  - topic: linear_regression
    uid: ols_assumptions
    difficulty: 3
    question: "Какие ключевые предположения у линейной регрессии (OLS)?"
    answer: |
      • Линейность: связь между признаками и таргетом линейна по параметрам.
      • Независимость ошибок (нет автокорреляции остатков).
      • Гомоскедастичность: дисперсия ошибок постоянна (не растёт с x).
      • Нормальность остатков (нужна в основном для доверительных интервалов
        и тестов, не для самой оценки коэффициентов).
      • Отсутствие сильной мультиколлинеарности между признаками (иначе
        коэффициенты нестабильны).

      Если нарушены — оценки могут быть смещёнными/неэффективными, а p-values
      ненадёжными.
  - topic: linear_regression
    uid: mse_why
    difficulty: 2
    question: "Почему линейную регрессию обучают на MSE, а не на MAE? Плюсы и минусы."
    answer: |
      MSE = mean((y_pred - y_true)²), MAE = mean(|y_pred - y_true|).

      Почему чаще MSE:
        • Гладкая, всюду дифференцируемая → удобно для gradient descent и есть
          аналитическое решение (normal equation).
        • Сильнее штрафует крупные ошибки (квадрат) → модель их избегает.
        • Минимизация MSE даёт оценку условного среднего E[y|x].

      Минусы MSE: чувствительна к выбросам (один большой остаток в квадрате
      доминирует). MAE робастнее к выбросам и оценивает медиану, но негладкая
      в нуле и оптимизировать сложнее.

  # --- logistic regression ---
  - topic: logistic_regression
    uid: logreg_why_not_mse
    difficulty: 3
    question: "Почему logistic regression обучают на log loss, а не на MSE?"
    answer: |
      Logistic regression предсказывает вероятность через sigmoid:
        p = 1 / (1 + e^(-w·x))

      Если взять MSE с sigmoid, loss получается невыпуклым по весам → gradient
      descent застревает в локальных минимумах. Log loss (binary cross-entropy):
        L = -[y·log(p) + (1-y)·log(1-p)]
      в паре с sigmoid даёт ВЫПУКЛУЮ функцию → один глобальный минимум, обучение
      устойчиво.

      Плюс log loss следует из maximum likelihood для Bernoulli-распределения —
      то есть это статистически обоснованный выбор, а не просто удобный.
  - topic: logistic_regression
    uid: sigmoid
    difficulty: 2
    question: "Что делает sigmoid в логистической регрессии и как интерпретировать её выход?"
    answer: |
      Sigmoid: σ(z) = 1 / (1 + e^(-z)), где z = w·x + b — линейная комбинация.
      Она "сжимает" любое число из (-∞, +∞) в (0, 1), и выход трактуем как
      вероятность класса 1: p = P(y=1 | x).

      Решение о классе — порогом (обычно 0.5): p ≥ 0.5 → класс 1.
      Порог можно двигать под задачу (баланс precision/recall).

      Бонус: z = log(p / (1-p)) — это log-odds (логарифм шансов). Поэтому
      коэффициент w_i интерпретируется как изменение log-odds при росте x_i на 1.

  # --- метрики классификации ---
  - topic: classification_metrics
    uid: precision_recall
    difficulty: 2
    question: "В чём разница между precision и recall? Когда что важнее?"
    answer: |
      По confusion matrix (TP, FP, FN, TN):
        • Precision = TP / (TP + FP) — из тех, кого назвали положительными,
          сколько действительно положительные. "Не поднимать ложную тревогу".
        • Recall   = TP / (TP + FN) — из всех реально положительных сколько мы
          поймали. "Не пропустить".

      Когда что важнее:
        • Recall важнее, когда дорог пропуск (медицина: не пропустить болезнь;
          fraud: не пропустить мошенничество).
        • Precision важнее, когда дорога ложная тревога (спам-фильтр: не закинуть
          важное письмо в спам).

      Компромисс — F1 = 2·P·R / (P+R), гармоническое среднее.
  - topic: classification_metrics
    uid: roc_auc
    difficulty: 3
    question: "Что показывает ROC-AUC и почему он устойчив к дисбалансу классов?"
    answer: |
      ROC-кривая — это TPR (recall) по оси Y против FPR = FP/(FP+TN) по оси X при
      переборе всех порогов. AUC — площадь под ней.

      Интерпретация AUC: вероятность, что случайный положительный объект получит
      бо́льший score, чем случайный отрицательный. AUC = 0.5 — случайно, 1.0 —
      идеально.

      Почему устойчив к дисбалансу: TPR и FPR считаются ВНУТРИ своих классов
      (нормированы на размер класса), поэтому пропорция классов на них не влияет
      напрямую. Важная оговорка: при сильном дисбалансе ROC-AUC может быть
      оптимистичным — тогда честнее PR-AUC (precision-recall), он чувствительнее
      к редкому положительному классу.

  # --- метрики регрессии ---
  - topic: regression_metrics
    uid: r2
    difficulty: 2
    question: "Что такое R² (коэффициент детерминации) и как его читать?"
    answer: |
      R² = 1 - SS_res / SS_tot, где
        SS_res = sum((y - y_pred)²)  — ошибка модели,
        SS_tot = sum((y - ȳ)²)       — ошибка "тупого" предсказания средним.

      Смысл: какую долю дисперсии таргета объясняет модель.
        • R² = 1 — идеально; R² = 0 — модель не лучше предсказания средним.
        • R² < 0 — модель ХУЖЕ, чем просто среднее (бывает на test).

      Подвох: R² не убывает при добавлении любых признаков на train → для сравнения
      моделей с разным числом фич берут Adjusted R² (штрафует за лишние признаки).

  # --- decision trees ---
  - topic: decision_trees
    uid: gini_entropy
    difficulty: 3
    question: "Как дерево решает, по какому признаку делать split? Что такое Gini и entropy?"
    answer: |
      Дерево на каждом узле перебирает признаки и пороги и выбирает split,
      который максимально снижает "загрязнённость" (impurity) дочерних узлов.

      Меры impurity для классификации:
        • Gini = 1 - sum(p_i²)  — вероятность ошибиться, если случайно навесить
          класс по распределению в узле. 0 — узел чистый.
        • Entropy = -sum(p_i · log2(p_i)) — мера неопределённости из теории
          информации.

      Выбирают split с максимальным information gain = impurity(родитель) −
      взвешенная impurity(детей). Gini и entropy на практике дают похожие деревья;
      Gini чуть дешевле считать (нет логарифма), поэтому он по умолчанию в sklearn.
  - topic: decision_trees
    uid: tree_overfit
    difficulty: 2
    question: "Почему деревья склонны к overfitting и как это ограничивают?"
    answer: |
      Дерево без ограничений может расти, пока каждый лист не станет чистым —
      по сути запоминает train целиком (ловит шум) → высокая variance.

      Ограничивают через гиперпараметры (pre-pruning):
        • max_depth — максимальная глубина.
        • min_samples_split / min_samples_leaf — минимум объектов для split / в листе.
        • max_features — сколько признаков рассматривать в узле.
      Либо post-pruning (cost-complexity pruning, ccp_alpha) — отрезают слабые
      ветви после построения. Радикальнее — не одно дерево, а ансамбль (Random
      Forest усредняет много деревьев и гасит variance).

  # --- ансамбли ---
  - topic: ensembles
    uid: bagging_boosting
    difficulty: 3
    question: "В чём принципиальная разница между bagging и boosting?"
    answer: |
      Оба — ансамбли, но борются с разными частями ошибки и строятся по-разному:

      Bagging (например Random Forest):
        • Учим много моделей ПАРАЛЛЕЛЬНО и независимо на bootstrap-подвыборках.
        • Усредняем предсказания. Снижает в основном VARIANCE.
        • Базовые модели сильные, но переобученные (глубокие деревья) — усреднение
          их стабилизирует.

      Boosting (GBM, XGBoost, LightGBM):
        • Учим модели ПОСЛЕДОВАТЕЛЬНО, каждая следующая исправляет ошибки
          предыдущих (фокус на трудных объектах / на остатках градиента).
        • Снижает в основном BIAS (и часто финально лучше по качеству).
        • Базовые модели слабые (неглубокие деревья). Чувствительнее к шуму и
          требует аккуратной настройки (learning rate, число деревьев).
  - topic: ensembles
    uid: rf_random
    difficulty: 2
    question: "За счёт чего Random Forest снижает корреляцию между деревьями?"
    answer: |
      Если просто обучить много деревьев на одних данных, они будут почти
      одинаковыми, и усреднение мало что даст. RF добавляет две случайности:

        1. Bootstrap (bagging): каждое дерево учится на выборке с возвращением
           из train (примерно 63% уникальных объектов).
        2. Random subspace: в каждом split рассматривается только случайное
           подмножество признаков (max_features), а не все.

      Это делает деревья РАЗНЫМИ (декоррелирует их). Усреднение независимых
      ошибок сильнее снижает variance ансамбля. Бонус — объекты, не попавшие в
      bootstrap (out-of-bag), дают бесплатную оценку качества.

  # --- preprocessing ---
  - topic: feature_scaling
    uid: scaling_when
    difficulty: 2
    question: "Каким моделям нужно масштабирование признаков, а каким нет? Почему?"
    answer: |
      Масштабирование (StandardScaler, MinMaxScaler) ВАЖНО для моделей, которые
      опираются на расстояния или на величину весов:
        • KNN, K-Means, SVM (RBF) — считают расстояния, признак с большим
          масштабом доминирует.
        • Linear/Logistic regression с регуляризацией — штраф зависит от величины
          весов, а значит и от масштаба признаков.
        • Gradient descent сходится быстрее на нормированных признаках.
        • PCA — ищет направления максимальной дисперсии, чувствителен к масштабу.

      НЕ нужно деревьям и ансамблям на деревьях (Decision Tree, Random Forest,
      Gradient Boosting): они делят по порогам признака по отдельности, и
      монотонное преобразование шкалы split-ы не меняет.

      Важно: scaler фитим на train, применяем к test (иначе data leakage).
