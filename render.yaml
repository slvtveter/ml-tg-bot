# Render Blueprint. В дашборде: New + -> Blueprint -> подключить этот репозиторий.
# Render прочитает файл и создаст web-сервис из Dockerfile. Значения секретов
# (sync: false) нужно вписать в дашборде после создания.
services:
  - type: web
    name: mlsobesbot
    runtime: docker
    plan: free
    region: frankfurt
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      # Публичный адрес сервиса. Впиши вручную после первого деплоя,
      # например https://mlsobesbot.onrender.com (без /webhook на конце).
      - key: WEBHOOK_URL
        sync: false
      - key: TZ
        value: Europe/Moscow
      - key: QOTD_HOUR
        value: "9"
      - key: KEEPALIVE_MINUTES
        value: "10"
